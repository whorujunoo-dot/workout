<style>
:root{--bg:#0a0a0f;--card:#14141f;--a:#00e5a0;--ad:rgba(0,229,160,.15);--ag:rgba(0,229,160,.3);--w:#ff6b6b;--wd:rgba(255,107,107,.15);--t:#e8e8f0;--td:#6b6b80;--bd:#22223a;--o:#ffaa40;--od:rgba(255,170,64,.15);--bl:#4da6ff;--bld:rgba(77,166,255,.15);--p:#b18cff;--pd:rgba(177,140,255,.15)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;max-width:500px;margin:0 auto;-webkit-font-smoothing:antialiased;overscroll-behavior:none;padding-bottom:90px;padding-top:env(safe-area-inset-top,0)}
.pg{display:none;padding:24px 16px}.pg.on{display:block}
.cd{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;border:1px solid var(--bd)}
.bp{background:var(--a);color:#0a0a0f;border:none;border-radius:12px;padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}.bp:active{transform:scale(.97)}
.bs{background:0 0;color:var(--a);border:1.5px solid var(--a);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
.bi{background:0 0;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;color:var(--td)}.bi.dg{color:var(--w)}
input,textarea{background:#0d0d18;border:1.5px solid var(--bd);border-radius:10px;padding:12px 14px;color:var(--t);font-size:15px;width:100%;outline:none;font-family:inherit}input:focus,textarea:focus{border-color:var(--a)}input::placeholder,textarea::placeholder{color:var(--td)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.ch{display:inline-flex;align-items:center;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:0 0;color:var(--td);white-space:nowrap;font-family:inherit}.ch.on{border-color:var(--a);background:var(--ad);color:var(--a)}.ch.oo{border-color:var(--o);background:var(--od);color:var(--o)}
.bg{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}.ba{background:var(--ad);color:var(--a)}.bo{background:var(--od);color:var(--o)}.bb{background:var(--bld);color:var(--bl)}.bpp{background:var(--pd);color:var(--p)}
.lb{font-size:13px;font-weight:600;color:var(--td);display:block;margin-bottom:6px}
.fb{display:flex;justify-content:space-between;align-items:center}.fw{display:flex;gap:6px;flex-wrap:wrap}
.tg{display:flex;background:#0d0d18;border-radius:10px;border:1.5px solid var(--bd);overflow:hidden}.tg button{flex:1;padding:8px 12px;font-size:13px;font-weight:600;border:none;background:0 0;color:var(--td);cursor:pointer;font-family:inherit}.tg button.on{background:var(--a);color:#0a0a0f}
.tb{position:fixed;bottom:12px;left:12px;right:12px;max-width:476px;margin:0 auto;background:rgba(20,20,31,.92);border:1px solid var(--bd);border-radius:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:50;padding:4px}
.tb-i{display:flex}
.tbn{flex:1;background:0 0;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0;cursor:pointer;color:var(--td);font-family:inherit;border-radius:16px}.tbn.on{color:var(--a);background:rgba(0,229,160,.08)}.tbn span{font-size:10px;font-weight:600}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.si{padding:10px 8px;font-size:15px;font-weight:600;text-align:center}
.yt-t{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:16/9;background:#000}.yt-t img{width:100%;height:100%;object-fit:cover}
.yt-p{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4)}.yt-p svg{width:48px;height:48px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.ch2{font-size:11px;font-weight:700;color:var(--td);padding:6px 0}
.cd2{font-size:13px;padding:8px 0;border-radius:8px;position:relative;color:var(--td);cursor:pointer}.cd2.cm{color:var(--t)}.cd2.tod{font-weight:800;color:var(--a)}.cd2.hw::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--a)}
.moti{background:linear-gradient(135deg,#1a1a30,#14142a);border:1px solid rgba(177,140,255,.2);border-radius:16px;padding:20px;margin-bottom:20px;text-align:center}.moti .q{font-size:16px;font-weight:600;line-height:1.6}
/* Current set highlight */
.set-active{background:rgba(0,229,160,.08);border-radius:8px;padding:4px 2px;margin-bottom:2px}
.set-done{opacity:.45;margin-bottom:2px}
/* Mini chart */
.mchart{display:flex;gap:6px;overflow-x:auto;padding:0 4px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.mchart .bar-w{display:flex;flex-direction:column;align-items:center;min-width:48px;width:48px;flex-shrink:0}
.mchart .bar-area{width:100%;height:25vw;max-height:140px;min-height:100px;display:flex;align-items:flex-end}
.mchart .bar{width:100%;background:var(--a);border-radius:4px 4px 0 0;min-height:4px}
.mchart .bar.today{background:var(--o)}
.mchart .bar-lb{font-size:9px;color:var(--td);margin-top:5px;text-align:center;white-space:nowrap}
.mchart .bar-val{font-size:9px;color:var(--a);text-align:center;font-weight:600;margin-top:1px}
/* Stats */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.stat-box .n{font-size:24px;font-weight:800;color:var(--a)}.stat-box .l{font-size:11px;color:var(--td);margin-top:2px}
</style>
</head>

async function dA(s){const d=await odb();return new Promise((r,j)=>{const t=d.transaction(s);const q=t.objectStore(s).getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>j(q.error)})}
async function dP(s,o){const d=await odb();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(o);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}
async function dD(s,k){const d=await odb();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}

function tQ(){const d=new Date(),n=Math.floor((d-new Date(d.getFullYear(),0,0))/864e5);return QT[n%QT.length]}
// Match logs by exercise id, OR by identical name (handles same exercise saved under different IDs)
function exLogs(eid){const ex=E.find(x=>x.id===eid);const nm=ex?ex.name:null;return L.filter(l=>l.exerciseId===eid||(nm&&l.exerciseName===nm));}
function gLL(eid){return exLogs(eid).sort((a,b)=>(b.ts||b.timestamp||0)-(a.ts||a.timestamp||0))[0]||null}
function getLast10(eid){return exLogs(eid).sort((a,b)=>(a.ts||a.timestamp||0)-(b.ts||b.timestamp||0)).slice(-10)}
function normP(p){if(p.days)p.days=p.days.map(d=>({l:d.l||d.label||'',e:d.e||d.eids||d.exerciseIds||[]}));return p}
function normL(l){if(!l.ts&&l.timestamp)l.ts=l.timestamp;if(l.sets)l.sets=l.sets.map(s=>{if(s.holdSec&&!s.sec)s.sec=s.holdSec;return s;});return l}

// Group logs by session (sessId or date+startedAt fallback so AM/PM sessions split)
function groupSessions(){
  const groups={};
  L.forEach(l=>{
    // For legacy logs without sessId, split by date + start time so morning/afternoon don't merge
    const key=l.sessId||(l.date+'#'+(l.startedAt||''));
    if(!groups[key])groups[key]={date:l.date,logs:[],completedAt:l.completedAt,startedAt:l.startedAt,duration:l.duration,memo:l.memo,sessId:l.sessId,ts:l.ts||0};
    groups[key].logs.push(l);
    if((l.ts||0)>groups[key].ts){groups[key].ts=l.ts;groups[key].completedAt=l.completedAt||groups[key].completedAt;groups[key].duration=l.duration||groups[key].duration;groups[key].memo=l.memo||groups[key].memo;groups[key].startedAt=l.startedAt||groups[key].startedAt;}
  });
  return Object.values(groups).sort((a,b)=>b.ts-a.ts);
}
// Time-of-day badge from "HH:MM"
function todBadge(hhmm){if(!hhmm)return'';const h=parseInt(hhmm.split(':')[0]);if(isNaN(h))return'';if(h<12)return'🌅 오전';if(h<17)return'☀️ 오후';return'🌙 저녁';}

// Volume calc
function logVol(l){
  const mult=l.sides==='alt'?2:1;
  if(l.type==='hold')return l.sets.reduce((s,x)=>s+(parseInt(x.sec||x.holdSec)||0),0)*mult;
  if(l.type==='weight')return l.sets.reduce((s,x)=>s+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0)*mult;
  return l.sets.reduce((s,x)=>s+(parseInt(x.reps)||0),0)*mult;
}

// Auto save
async function autoSave(){
  if(!sE.length)return;const dt=tod(),now=Date.now();
  for(const ex of sE){
    // Skipped exercises: delete any already-saved log and skip
    if(ex._skip){
      if(ex._lid){try{await dD('logs',ex._lid);}catch(e){}L=L.filter(l=>l.id!==ex._lid);ex._lid=null;}
      continue;
    }
    let valid;
    if(ex.type==='hold')valid=ex.sets.filter(s=>s.sec&&s.sec!=='');
    else valid=ex.sets.filter(s=>s.reps&&s.reps!=='');
    if(!valid.length)continue;
    const sets=valid.map(s=>{
      if(ex.type==='weight'){const raw=parseFloat(s.kg)||0;const actual=ex.dumb==='one'?Math.round(raw*2*10)/10:raw;return{weight:String(actual),origW:s.kg,lb:s.lb||'',reps:s.reps,dumb:ex.dumb};}
      return{...s,dumb:ex.dumb};
    });
    const dur=Math.round((Date.now()-sStart)/60000);
    const stTime=new Date(sStart);const stStr=stTime.getHours().toString().padStart(2,'0')+':'+stTime.getMinutes().toString().padStart(2,'0');
    const entry={id:ex._lid||uid(),exerciseId:ex.id,exerciseName:ex.name,type:ex.type,date:dt,sets,restSec:ex.restSec,ts:now,dumb:ex.dumb,sides:ex.sides||'both',duration:dur,sessId:sessId,startedAt:stStr};
    if(!ex._lid)ex._lid=entry.id;
    await dP('logs',entry);const idx=L.findIndex(l=>l.id===entry.id);if(idx>=0)L[idx]=entry;else L.push(entry);
  }
}

function fSS(l){

// ═══ MINI CHART ═══
function miniChart(eid,type,todayEx,doneSets){
  // During active session: exclude ALL today's logs (they show as 오늘/예상 bars instead)
  const today=tod();
  const data=exLogs(eid).filter(l=>(sessId?l.date!==today:true)).sort((a,b)=>(a.ts||a.timestamp||0)-(b.ts||b.timestamp||0));
  const vals=data.map(l=>logVol(l));
  const ds=doneSets||0;
  // Completed volume (only done sets)
  let doneVol=0;
  // Projected volume (all sets with values)
  let projVol=0;
  if(todayEx){
    const sMult=todayEx.sides==='alt'?2:1;
    todayEx.sets.forEach((s,i)=>{
      let v=0;
      if(type==='weight'){const w=parseFloat(s.kg)||0;const r=parseInt(s.reps)||0;const a=todayEx.dumb==='one'?w*2:w;v=a*r;}
      else if(type==='bodyweight'){v=parseInt(s.reps)||0;}
      else if(type==='hold'){v=parseInt(s.sec)||0;}
      v*=sMult;
      projVol+=v;
      if(i<ds)doneVol+=v;
    });
  }
  // Use doneVol for today's bar, projVol for reference
  const todayBar=doneVol;
  const allVals=[...vals];
  if(projVol)allVals.push(projVol);
  if(todayBar)allVals.push(todayBar);
  if(!allVals.length)return'';
  const max=Math.max(...allVals,1);
  const unit=type==='weight'?'kg':type==='hold'?'초':'회';
  const mcId='mc'+eid.replace(/[^a-z0-9]/gi,'');
  let bars=data.map((l,i)=>{const pct=Math.max(vals[i]/max*100,5);return`<div class="bar-w"><div class="bar-area"><div class="bar" style="height:${pct}%"></div></div><div class="bar-lb">${fD(l.date)}</div><div class="bar-val">${Math.round(vals[i])}${unit}</div></div>`}).join('');
  // Today bar: completed volume (solid orange)
  if(todayBar>0){const pct=Math.max(todayBar/max*100,5);bars+=`<div class="bar-w"><div class="bar-area"><div class="bar today" style="height:${pct}%"></div></div><div class="bar-lb" style="color:var(--o)">오늘</div><div class="bar-val" style="color:var(--o)">${Math.round(todayBar)}${unit}</div></div>`;}
  // Projected bar: lighter color, only if more sets remain
  if(projVol>doneVol){const pct=Math.max(projVol/max*100,5);bars+=`<div class="bar-w"><div class="bar-area"><div class="bar" style="height:${pct}%;background:rgba(255,170,64,.3);border:1px dashed var(--o);border-bottom:none"></div></div><div class="bar-lb" style="color:var(--td)">예상</div><div class="bar-val" style="color:var(--td)">${Math.round(projVol)}${unit}</div></div>`;}
  const cnt=data.length+(todayBar?1:0)+(projVol>doneVol?1:0);
  const hint=cnt>6?'<div style="font-size:10px;color:var(--td);margin-top:6px">← 스크롤하여 이전 기록 보기</div>':'';
  const titleExtra=todayBar>0?' + 오늘':projVol>0?' + 예상':'';
  return`<div class="cd" style="padding:14px;margin:16px 0"><div style="font-size:12px;font-weight:700;color:var(--td);margin-bottom:10px">기록 추이 (${data.length}회${titleExtra})</div><div class="mchart" id="${mcId}">${bars}</div>${hint}</div>`;
}

// ═══ EXPECTED VOLUME ═══
function expectedVol(ex,doneSets){
  if(ex.type!=='weight')return'';
  let total=0,done=0;const ds=doneSets||0;
  const sMult=ex.sides==='alt'?2:1;
  ex.sets.forEach((s,i)=>{
    const w=parseFloat(s.kg)||0;
    const r=parseInt(s.reps)||0;
    const actual=ex.dumb==='one'?w*2:w;
    const vol=actual*r*sMult;
    total+=vol;
    if(i<ds)done+=vol;
  });
  if(!total)return'';
  return`<div style="font-size:12px;color:var(--o);margin-top:6px">📊 완료: <b>${Math.round(done)}kg</b> / 전체 예상: <b>${Math.round(total)}kg</b>${ex.sides==='alt'?' (한쪽씩 ×2)':''}</div>`;
}

}

  el.innerHTML=cs.map(c=>`<div style="margin-bottom:20px"><div style="font-size:13px;font-weight:700;color:var(--td);margin-bottom:8px">${esc(c)}</div>${E.filter(e=>(e.category||'기타')===c).map(e=>`<div class="cd" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center" id="qc-${e.id}" onclick="togQ('${e.id}')"><div><div style="font-weight:600;font-size:14px">${esc(e.name)}</div><div style="font-size:12px;color:var(--td)">${e.type==='weight'?'웨이트':e.type==='hold'?'버티기':'맨몸'}</div></div><span id="qk-${e.id}" style="color:var(--a);display:none;font-weight:800">✓</span></div>`).join('')}</div>`).join('');
  document.getElementById('qfl').style.display='none';
}
function togQ(id){const i=qS.indexOf(id);if(i>=0)qS.splice(i,1);else qS.push(id);document.getElementById('qc-'+id).style.borderColor=qS.includes(id)?'var(--a)':'var(--bd)';document.getElementById('qc-'+id).style.background=qS.includes(id)?'var(--ad)':'var(--card)';document.getElementById('qk-'+id).style.display=qS.includes(id)?'block':'none';document.getElementById('qfl').style.display=qS.length?'block':'none';document.getElementById('qc').textContent=qS.length;}
function startFQ(){startWO(qS)}
function startPD(pid,di){const p=P.find(x=>x.id===pid);if(p&&p.days[di])startWO(p.days[di].e)}

// ═══ SESSION ═══
function startWO(eids){
  sU='lb';curSet={};
  sE=eids.map(id=>{const e=E.find(x=>x.id===id);if(!e)return null;const last=gLL(id);
    let sets;
    if(e.type==='hold')sets=last?last.sets.map(s=>({sec:s.sec||s.holdSec||''})):[{sec:''}];
    else if(e.type==='weight')sets=last?last.sets.map(s=>({kg:s.origW||s.weight||'',reps:s.reps||'',lb:s.lb||''})):[{kg:'',reps:'',lb:''}];
    else sets=last?last.sets.map(s=>({reps:s.reps||''})):[{reps:''}];
    return{...e,sets,restSec:last?(last.restSec||60):60,dumb:last?(last.dumb||'both'):'both',sides:e.sides||last?.sides||'both',_lid:null};
  }).filter(Boolean);
  if(!sE.length)return;sI=0;sStart=Date.now();sessId=uid();reqNotify();_ctx();nav('ss');rSess();
}

function addExMidSession(){
  // Show exercise picker
  const el=document.getElementById('axl');
  const cs=[...new Set(E.map(e=>e.category||'기타'))];
  // Filter out already in session
  const inSession=new Set(sE.map(e=>e.id));
  el.innerHTML=cs.map(c=>{
    const exs=E.filter(e=>(e.category||'기타')===c&&!inSession.has(e.id));
    if(!exs.length)return'';
    return`<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:700;color:var(--td);margin-bottom:8px">${esc(c)}</div>${exs.map(e=>`<div class="cd" style="cursor:pointer" onclick="addExToSession('${e.id}')"><div style="font-weight:600;font-size:14px">${esc(e.name)}</div><div style="font-size:12px;color:var(--td)">${e.type==='weight'?'웨이트':e.type==='hold'?'버티기':'맨몸'}</div></div>`).join('')}</div>`;
  }).join('');
  if(!el.innerHTML.trim())el.innerHTML='<p style="color:var(--td);text-align:center;padding:40px">추가할 운동이 없습니다.</p>';
  nav('addex');
}

function addExToSession(id){
  const e=E.find(x=>x.id===id);if(!e)return;
  const last=gLL(id);
  let sets;
  if(e.type==='hold')sets=last?last.sets.map(s=>({sec:s.sec||s.holdSec||''})):[{sec:''}];
  else if(e.type==='weight')sets=last?last.sets.map(s=>({kg:s.origW||s.weight||'',reps:s.reps||'',lb:s.lb||''})):[{kg:'',reps:'',lb:''}];
  else sets=last?last.sets.map(s=>({reps:s.reps||''})):[{reps:''}];
  sE.push({...e,sets,restSec:last?(last.restSec||60):60,dumb:last?(last.dumb||'both'):'both',sides:e.sides||last?.sides||'both',_lid:null});
  nav('ss');rSess();
}

function rSess(){
  const ex=sE[sI];if(!ex)return;const last=gLL(ex.id);
  const rM=Math.floor(ex.restSec/60),rSc=ex.restSec%60;
  const vs=(ex.videos||[]).filter(v=>yid(v));
  const csi=curSet[sI]||0; // current set index
  const elapsed=Math.round((Date.now()-sStart)/60000);
  let h='';

  // Header
  h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><button class="bi" onclick="autoSave().then(()=>nav('home'))">◀</button><div style="flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden"><div style="height:100%;background:var(--a);width:${((sI+1)/sE.length)*100}%"></div></div><span style="font-size:12px;color:var(--td);font-weight:600">${sI+1}/${sE.length}</span><span style="font-size:11px;color:var(--td);margin-left:4px">⏱${elapsed}분</span></div>`;

  h+=`<div class="fb" style="margin:20px 0 8px"><h2 style="font-size:22px;font-weight:800">${esc(ex.name)}</h2><button class="bs" style="width:auto;padding:6px 12px;font-size:12px" onclick="addExMidSession()">+ 운동추가</button></div>`;
  if(ex._skip){
    h+=`<div style="background:var(--wd);border:1px solid rgba(255,107,107,.3);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:14px;font-weight:700;color:var(--w)">⏭ 건너뛴 운동</span><button style="background:var(--w);border:none;color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit" onclick="sE[${sI}]._skip=false;rSess()">다시 하기</button></div>`;
  }
  const tl=ex.type==='weight'?'웨이트':ex.type==='hold'?'버티기':'맨몸',tb=ex.type==='weight'?'ba':ex.type==='hold'?'bpp':'bo';
  h+=`<div class="fw" style="margin-bottom:16px"><span class="bg ${tb}">${tl}</span>${ex.sides==='alt'?'<span class="bg bpp">한쪽씩 ×2</span>':''}</div>`;

  // Sides toggle (양쪽 동시 vs 한쪽씩)
  h+=`<div style="display:flex;gap:8px;margin-bottom:14px"><div class="tg" style="flex:1"><button ${(ex.sides||'both')==='both'?'class="on"':''} onclick="setSides(${sI},'both')">양쪽 동시</button><button ${ex.sides==='alt'?'class="on"':''} onclick="setSides(${sI},'alt')">한쪽씩</button></div>`;
  if(ex.type==='weight'){
    h+=`<div class="tg" style="flex:1"><button ${sU==='kg'?'class="on"':''} onclick="sU='kg';rSess()">kg</button><button ${sU==='lb'?'class="on"':''} onclick="sU='lb';rSess()">lb</button></div>`;
  }
  h+=`</div>`;
  if(ex.sides==='alt')h+=`<div style="font-size:12px;color:var(--p);margin-bottom:10px">🔄 한쪽 기준 입력 → 볼륨은 양쪽(×2) 자동 계산</div>`;

  // Toggles (dumbbell)
  if(ex.type==='weight'){
    h+=`<div style="display:flex;gap:8px;margin-bottom:14px"><div class="tg" style="flex:1"><button ${ex.dumb==='both'?'class="on"':''} onclick="sE[${sI}].dumb='both';rSess()">덤벨 양쪽</button><button ${ex.dumb==='one'?'class="on"':''} onclick="sE[${sI}].dumb='one';rSess()">덤벨 한쪽</button></div></div>`;
    if(ex.dumb==='one')h+=`<div style="font-size:12px;color:var(--o);margin-bottom:10px">🔸 한쪽 무게 입력 → 기록은 양쪽(×2) 계산</div>`;
  }

  // Mini chart
  h+=miniChart(ex.id,ex.type,ex,curSet[sI]||0);

  // Videos
  if(vs.length)h+=`<div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:14px">${vs.map(v=>`<div class="yt-t" style="width:130px;flex-shrink:0" onclick="opV('${esc(v)}')"><img src="https://img.youtube.com/vi/${yid(v)}/mqdefault.jpg" loading="lazy"><div class="yt-p"><svg viewBox="0 0 68 48"><path d="M66.52 7.74c-.78-2.93-2.49-5.41-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55c-2.93.78-4.64 3.26-5.42 6.19C.06 13.05 0 24 0 24s.06 10.95 1.48 16.26c.78 2.93 2.49 5.41 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55c2.93-.78 4.64-3.26 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="red"/><path d="M45 24L27 14v20" fill="white"/></svg></div></div>`).join('')}</div>`;

  // Previous record with "days ago" label
  if(last){
    const daysAgo=Math.floor((new Date()-new Date(last.date+'T00:00:00'))/(864e5));
    const agoTxt=daysAgo===0?'오늘':daysAgo===1?'어제':daysAgo+'일 전';
    h+=`<div class="cd" style="background:var(--bld);border:1px solid rgba(77,166,255,.2);padding:12px;margin-bottom:14px;border-radius:12px"><div style="font-size:11px;font-weight:700;color:var(--bl);margin-bottom:4px">이전 기록 (${fD(last.date)} · ${agoTxt})${last.dumb==='one'?' 🔸한쪽':''}</div><div style="font-size:13px">${fSS(last)}</div></div>`;
  }

  // Sets with current set indicator
  h+=`<div style="margin-bottom:12px">`;
  if(ex.type==='hold'){
    h+=`<div style="display:grid;grid-template-columns:36px 1fr 50px 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--td);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--td)">목표(초)</span><span></span><span></span></div>`;
    ex.sets.forEach((s,si)=>{
      const cls=si<csi?'set-done':si===csi?'set-active':'';
      h+=`<div class="${cls}" style="display:grid;grid-template-columns:36px 1fr 50px 32px;gap:8px;align-items:center;margin-bottom:6px"><span style="text-align:center;font-size:14px;font-weight:700;color:${si===csi?'var(--o)':'var(--a)'}">${si===csi?'▶':si<csi?'✓':''} ${si+1}</span><input type="number" inputmode="numeric" class="si" value="${s.sec}" onchange="sE[${sI}].sets[${si}].sec=this.value;rSess()" placeholder="초"><button style="background:var(--pd);border:none;color:var(--p);border-radius:8px;padding:8px;cursor:pointer;font-size:13px;font-weight:700" onclick="goHold(${si})">▶</button>${ex.sets.length>1?`<button class="bi dg" onclick="sE[${sI}].sets.splice(${si},1);rSess()">✕</button>`:'<span></span>'}</div>`;
    });
  }else if(ex.type==='weight'){
    const uL=sU==='lb'?'무게(lb)':'무게(kg)';
    h+=`<div style="display:grid;grid-template-columns:36px 1fr 1fr 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--td);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--td)">${uL}</span><span style="font-size:11px;font-weight:700;color:var(--td)">횟수</span><span></span></div>`;
    ex.sets.forEach((s,si)=>{const dv=sU==='lb'&&s.lb?s.lb:s.kg;
      const cls=si<csi?'set-done':si===csi?'set-active':'';
      h+=`<div class="${cls}" style="display:grid;grid-template-columns:36px 1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:6px"><span style="text-align:center;font-size:14px;font-weight:700;color:${si===csi?'var(--o)':'var(--a)'}">${si===csi?'▶':si<csi?'✓':''} ${si+1}</span><input type="number" inputmode="decimal" class="si" value="${dv}" onchange="hWI(${si},this.value)" placeholder="0"><input type="number" inputmode="numeric" class="si" value="${s.reps}" onchange="sE[${sI}].sets[${si}].reps=this.value;rSess()" placeholder="0">${ex.sets.length>1?`<button class="bi dg" onclick="sE[${sI}].sets.splice(${si},1);if(curSet[${sI}]>=${si}&&curSet[${sI}]>0)curSet[${sI}]--;rSess()">✕</button>`:'<span></span>'}</div>`;
      if(sU==='lb'&&s.lb)h+=`<div style="grid-column:2;font-size:11px;color:var(--td);margin-top:-4px;margin-bottom:4px;padding-left:4px">= ${s.kg}kg${ex.dumb==='one'?' (양쪽 '+Math.round(parseFloat(s.kg)*2*10)/10+'kg)':''}</div>`;
      else if(ex.dumb==='one'&&s.kg)h+=`<div style="grid-column:2;font-size:11px;color:var(--td);margin-top:-4px;margin-bottom:4px;padding-left:4px">양쪽 = ${Math.round(parseFloat(s.kg)*2*10)/10}kg</div>`;
    });
  }else{
    h+=`<div style="display:grid;grid-template-columns:36px 1fr 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--td);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--td)">횟수</span><span></span></div>`;
    ex.sets.forEach((s,si)=>{
      const cls=si<csi?'set-done':si===csi?'set-active':'';
      h+=`<div class="${cls}" style="display:grid;grid-template-columns:36px 1fr 32px;gap:8px;align-items:center;margin-bottom:6px"><span style="text-align:center;font-size:14px;font-weight:700;color:${si===csi?'var(--o)':'var(--a)'}">${si===csi?'▶':si<csi?'✓':''} ${si+1}</span><input type="number" inputmode="numeric" class="si" value="${s.reps}" onchange="sE[${sI}].sets[${si}].reps=this.value;rSess()" placeholder="0">${ex.sets.length>1?`<button class="bi dg" onclick="sE[${sI}].sets.splice(${si},1);rSess()">✕</button>`:'<span></span>'}</div>`;
    });
  }
  h+=`</div>`;

  // Set done + add buttons
  h+=`<div style="display:flex;gap:8px;margin:16px 0 20px"><button class="bp" style="flex:2;font-size:14px;padding:12px" onclick="markSetDone()">세트 완료 ✓</button><button class="bs" style="flex:1;font-size:13px;padding:10px" onclick="addSS()">+ 세트</button></div>`;

  // Expected volume
  h+=expectedVol(ex,curSet[sI]||0);

  // Rest
  h+=`<div class="cd" style="display:flex;align-items:center;gap:12px;padding:14px;margin-top:6px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/></svg><div style="flex:1"><div style="font-size:13px;font-weight:600;margin-bottom:4px">쉬는 시간</div><div style="display:flex;gap:6px;align-items:center"><input type="number" inputmode="numeric" style="width:50px;text-align:center;padding:6px 8px;font-size:14px" value="${rM}" onchange="uRest(this.value,null)"><span style="font-size:13px;color:var(--td)">분</span><input type="number" inputmode="numeric" style="width:50px;text-align:center;padding:6px 8px;font-size:14px" value="${rSc}" onchange="uRest(null,this.value)"><span style="font-size:13px;color:var(--td)">초</span></div></div><button style="background:var(--ad);border:none;color:var(--a);border-radius:10px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit" onclick="startR()">시작</button></div>`;

  h+=`<div style="display:flex;gap:10px;margin-top:24px">`;
  if(sI>0)h+=`<button class="bs" style="flex:1" onclick="sI--;rSess();window.scrollTo(0,0)">이전</button>`;
  h+=`<button class="bs" style="flex:1;border-color:var(--w);color:var(--w)" onclick="skipEx()">건너뛰기</button>`;
  if(sI<sE.length-1)h+=`<button class="bp" style="flex:1" onclick="sI++;rSess();window.scrollTo(0,0)">다음 운동</button>`;
  else h+=`<button class="bp" style="flex:1;background:var(--o)" onclick="finWO()">운동 완료!</button>`;
  h+=`</div>`;
  document.getElementById('ssc').innerHTML=h;
  // Scroll mini charts to rightmost (today) — innerHTML <script> doesn't execute, so do it here
  requestAnimationFrame(()=>{document.querySelectorAll('.mchart').forEach(el=>{el.style.scrollBehavior='auto';el.scrollLeft=el.scrollWidth;el.style.scrollBehavior='';});});
}

function markSetDone(){
  const ex=sE[sI];const cs=curSet[sI]||0;
  if(cs<ex.sets.length-1){curSet[sI]=cs+1;rSess();startR();}
  else{curSet[sI]=ex.sets.length;rSess();} // all done
}

function skipEx(){
  sE[sI]._skip=true;
  if(sI<sE.length-1){sI++;rSess();window.scrollTo(0,0);}
  else finWO();
}

function hWI(si,v){const p=pW(v,sU);sE[sI].sets[si].kg=p.kg;sE[sI].sets[si].lb=p.lb;rSess();}

// Save sides preference to exercise DB (persists across sessions)
function setSides(idx,val){
  sE[idx].sides=val;
  // Save to exercise object in DB
  const exId=sE[idx].id;
  const ex=E.find(x=>x.id===exId);
  if(ex){ex.sides=val;dP('exercises',ex);}
  rSess();
}
function addSS(){const ex=sE[sI],last=ex.sets[ex.sets.length-1]||{};if(ex.type==='hold')ex.sets.push({sec:last.sec||''});else if(ex.type==='weight')ex.sets.push({kg:last.kg||'',reps:last.reps||'',lb:last.lb||''});else ex.sets.push({reps:last.reps||''});rSess();}
function uRest(m,s){const ex=sE[sI],cM=Math.floor(ex.restSec/60),cS=ex.restSec%60;ex.restSec=(m!==null?parseInt(m)||0:cM)*60+(s!==null?parseInt(s)||0:cS);}

// Rest timer with encouragement (background-safe: uses absolute end time)
function startR(){rT=sE[sI].restSec;if(rT<=0)return;rL=rT;rEnd=Date.now()+rT*1000;rLastBeep=-1;reqNotify();document.getElementById('oR').style.display='flex';
  // One encouragement line only
  const msg=REST_MSG[Math.floor(Math.random()*REST_MSG.length)];
  document.getElementById('rMsg').innerHTML=`<div style="font-size:15px;color:var(--o);line-height:1.6">${msg}</div>`;
  uRD();rI=setInterval(rTick,250);
}
function rTick(){
  rL=Math.max(0,Math.round((rEnd-Date.now())/1000));
  // Countdown beeps at 5,4,3,2,1
  if(rL<=5&&rL>=1&&rL!==rLastBeep){rLastBeep=rL;countBeep();}
  uRD();
  if(rL<=0){const wasHidden=document.visibilityState==='hidden';finishR(wasHidden);}
}
function finishR(background){
  clearInterval(rI);rI=null;
  endBeep();
  if(background)notify('💪 휴식 끝!','다음 세트를 시작하세요.');
  document.getElementById('oR').style.display='none';
}
function uRD(){const m=Math.floor(rL/60),s=rL%60;const rd=document.getElementById('rd');rd.textContent=m+':'+s.toString().padStart(2,'0');rd.style.color=rL<=5?'var(--o)':'var(--a)';const c=2*Math.PI*90;document.getElementById('rc').setAttribute('stroke-dashoffset',c*(1-rL/rT));document.getElementById('rc').setAttribute('stroke',rL<=5?'var(--o)':'var(--a)');}
function stopR(){clearInterval(rI);rI=null;rEnd=0;document.getElementById('oR').style.display='none';}

function goHold(si){const t=parseInt(sE[sI].sets[si].sec)||30;hL=t;hCb=si;hEnd=Date.now()+t*1000;hLastBeep=-1;reqNotify();document.getElementById('oH').style.display='flex';document.getElementById('hlb').textContent=sE[sI].name+' — 세트 '+(si+1);document.getElementById('hdd').textContent=hL;document.getElementById('hdd').style.color='var(--o)';
  hI=setInterval(()=>{
    hL=Math.max(0,Math.round((hEnd-Date.now())/1000));
    if(hL<=5&&hL>=1&&hL!==hLastBeep){hLastBeep=hL;countBeep();}
    document.getElementById('hdd').textContent=hL;
    if(hL<=0){clearInterval(hI);hI=null;endBeep();if(document.visibilityState==='hidden')notify('⏱ 버티기 완료!','수고했어요. 세트 완료를 눌러주세요.');document.getElementById('hdd').style.color='var(--a)';document.getElementById('hdd').textContent='✓';}
  },250);}
function stopH(ok){clearInterval(hI);hI=null;hEnd=0;document.getElementById('oH').style.display='none';if(ok&&hCb!==null){const t=parseInt(sE[sI].sets[hCb].sec)||0;sE[sI].sets[hCb].sec=String(t-Math.max(hL,0));curSet[sI]=(curSet[sI]||0)+1;rSess();}hCb=null;}

async function finWO(){await autoSave();fDur=Math.round((Date.now()-sStart)/60000);const now=new Date();fTime=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');const doneCount=sE.filter(e=>!e._skip).length;document.getElementById('mmi').textContent=fDur2(fDur)+' 동안 '+doneCount+'개 운동';document.getElementById('mmt').textContent='완료 시각: '+fTime;document.getElementById('mmtx').value='';sE=[];sI=0;curSet={};nav('mm');}

async function saveMemo(){const memo=document.getElementById('mmtx').value.trim();const dt=tod();
  // Find logs from this session, or fallback to today's latest
  let tl=L.filter(l=>l.sessId===sessId).sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(!tl.length)tl=L.filter(l=>l.date===dt).sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(tl.length){tl[0].memo=memo;tl[0].completedAt=fTime;tl[0].duration=fDur;await dP('logs',tl[0]);}rSum();nav('sm');}

// Map a category string to a normalized body-part group
function bodyPart(cat){
  const c=(cat||'').toLowerCase();
  const map=[
    ['가슴','가슴'],['chest','가슴'],['벤치','가슴'],
    ['등','등'],['back','등'],['랫','등'],['로우','등'],['풀업','등'],['턱걸이','등'],
    ['어깨','어깨'],['shoulder','어깨'],['숄더','어깨'],['델트','어깨'],
    ['하체','하체'],['leg','하체'],['다리','하체'],['스쿼트','하체'],['스콰트','하체'],['런지','하체'],['데드','하체'],['둔근','하체'],['엉덩','하체'],['햄','하체'],['종아리','하체'],
    ['팔','팔'],['arm','팔'],['이두','팔'],['삼두','팔'],['biceps','팔'],['triceps','팔'],['컬','팔'],
    ['복근','코어'],['코어','코어'],['core','코어'],['abs','코어'],['플랭크','코어'],['크런치','코어'],
    ['유산소','유산소'],['cardio','유산소'],['러닝','유산소'],['달리기','유산소'],['바이크','유산소']
  ];
  for(const [k,v] of map)if(c.includes(k))return v;
  return cat||'기타';
}
// Recommended weekly sessions per body part (rough hypertrophy guideline)
const PART_TARGET={'가슴':2,'등':2,'어깨':2,'하체':2,'팔':2,'코어':2};
const MAJOR_PARTS=['가슴','등','어깨','하체','팔','코어'];

// Analyze last `days` of logs → structured insight object
function analyze(days=14){
  const now=Date.now(),cutoff=now-days*864e5;
  const recent=L.filter(l=>{const t=l.ts||l.timestamp||0;return t>=cutoff;});
  // Map exerciseId → category via E
  const exCat={};E.forEach(e=>{exCat[e.id]=e.category||'';});
  // Per body part: count distinct session-days, total volume, exercise set
  const parts={};
  recent.forEach(l=>{
    const cat=exCat[l.exerciseId]!=null?exCat[l.exerciseId]:'';
    const bp=bodyPart(cat);
    if(!parts[bp])parts[bp]={vol:0,sets:0,logs:0,exs:new Set(),days:new Set()};
    parts[bp].vol+=logVol(l);
    parts[bp].sets+=(l.sets||[]).length;
    parts[bp].logs++;
    parts[bp].exs.add(l.exerciseName);
    parts[bp].days.add((l.sessId||l.date));
  });
  // Weeks factor for per-week normalization
  const weeks=days/7;
  // Neglected: major parts not trained at all, or below target frequency
  const trained=Object.keys(parts);
  const neglected=MAJOR_PARTS.filter(p=>!trained.includes(p));
  const under=[];
  MAJOR_PARTS.forEach(p=>{
    if(!parts[p])return;
    const perWeek=parts[p].days.size/weeks;
    const target=PART_TARGET[p]||2;
    if(perWeek<target-0.4)under.push({part:p,perWeek:perWeek,target:target});
  });
  // Per-exercise progression (compare last vs the one before, within history)
  const exProg=[];
  E.forEach(e=>{
    const logs=getLast10(e.id);
    if(logs.length<2)return;
    const last=logs[logs.length-1],prev=logs[logs.length-2];
    const lv=logVol(last),pv=logVol(prev);
    if(pv<=0)return;
    const pct=(lv-pv)/pv*100;
    exProg.push({name:e.name,part:bodyPart(e.category),pct,lv,pv,n:logs.length,type:e.type});
  });
  // Stale: exercises with history but not done in `days`
  const recentExIds=new Set(recent.map(l=>l.exerciseId));
  const stale=[];
  E.forEach(e=>{
    const last=gLL(e.id);
    if(!last)return;
    if(recentExIds.has(e.id))return;
    const daysAgo=Math.floor((now-(last.ts||new Date(last.date+'T00:00:00').getTime()))/864e5);
    stale.push({name:e.name,part:bodyPart(e.category),daysAgo});
  });
  stale.sort((a,b)=>b.daysAgo-a.daysAgo);
  // Volume balance: share per part
  const totalVol=Object.values(parts).reduce((s,p)=>s+p.vol,0)||1;
  const balance=Object.entries(parts).map(([p,d])=>({part:p,vol:d.vol,share:d.vol/totalVol,days:d.days.size,exs:d.exs.size})).sort((a,b)=>b.vol-a.vol);
  return {days,parts,neglected,under,exProg,stale,balance,totalVol,sessionCount:new Set(recent.map(l=>l.sessId||l.date)).size};
}

function rSum(){

  let entries=L.filter(l=>l.sessId===sessId);

  const old=L.filter(l=>!entries.find(e=>e.id===l.id));
  let tV=0,tS=0,tR=0;const items=[];

    const cv=logVol(e);
    if(e.type==='hold'){tS+=e.sets.length;if(prev){const pv=logVol(prev);const d=cv-pv;items.push({t:d>0?'up':d<0?'dn':'eq',x:`${e.exerciseName}: ${d>0?'+':''}${d}초${d>0?' ▲':d<0?' ▼':''}`});}else items.push({t:'nw',x:`${e.exerciseName}: 첫 기록! 🎉`});}

// ═══ HISTORY with stats ═══
function rHist(){
  const totalDays=new Set(L.map(l=>l.date)).size;
  const totalSets=L.reduce((s,l)=>s+l.sets.length,0);
  const totalVol=Math.round(L.filter(l=>l.type==='weight').reduce((s,l)=>s+logVol(l),0));
  const streak=calcStreak();

  // Period comparisons
  const now=new Date(),ts=tod();
  function periodVol(startDate,endDate){return Math.round(L.filter(l=>{const d=new Date(l.date+'T00:00:00');return d>=startDate&&d<endDate&&l.type==='weight'}).reduce((s,l)=>s+logVol(l),0));}
  function periodDays(startDate,endDate){return new Set(L.filter(l=>{const d=new Date(l.date+'T00:00:00');return d>=startDate&&d<endDate}).map(l=>l.date)).size;}

  // This week vs last week
  const thisWkS=new Date(now);thisWkS.setDate(now.getDate()-now.getDay());thisWkS.setHours(0,0,0,0);
  const lastWkS=new Date(thisWkS.getTime()-7*864e5);
  const thisWkV=periodVol(thisWkS,new Date(thisWkS.getTime()+7*864e5));
  const lastWkV=periodVol(lastWkS,thisWkS);
  const thisWkD=periodDays(thisWkS,new Date(thisWkS.getTime()+7*864e5));
  const lastWkD=periodDays(lastWkS,thisWkS);

  // This month vs last month
  const thisMoS=new Date(now.getFullYear(),now.getMonth(),1);
  const lastMoS=new Date(now.getFullYear(),now.getMonth()-1,1);
  const thisMoV=periodVol(thisMoS,new Date(now.getFullYear(),now.getMonth()+1,1));
  const lastMoV=periodVol(lastMoS,thisMoS);
  const thisMoD=periodDays(thisMoS,new Date(now.getFullYear(),now.getMonth()+1,1));
  const lastMoD=periodDays(lastMoS,thisMoS);

  function cmpArrow(cur,prev){if(!prev)return'<span style="color:var(--td)">—</span>';const d=cur-prev;const pct=Math.round(d/prev*100);if(d>0)return`<span style="color:var(--a)">▲ ${pct}%</span>`;if(d<0)return`<span style="color:var(--w)">▼ ${Math.abs(pct)}%</span>`;return`<span style="color:var(--td)">→ 동일</span>`;}

  document.getElementById('hstat').innerHTML=`
    <div class="stat-row"><div class="stat-box"><div class="n">${totalDays}</div><div class="l">총 운동일</div></div><div class="stat-box"><div class="n">${streak}</div><div class="l">연속 주간</div></div></div>
    <div class="stat-row"><div class="stat-box"><div class="n">${totalSets}</div><div class="l">총 세트</div></div><div class="stat-box"><div class="n">${totalVol?totalVol.toLocaleString()+'kg':'-'}</div><div class="l">누적 볼륨</div></div></div>
    <div class="cd" style="padding:14px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px">📈 성장 비교</div>
      <table style="width:100%;font-size:13px;border-collapse:collapse">
        <tr style="color:var(--td)"><td></td><td style="text-align:right;padding:4px">이전</td><td style="text-align:right;padding:4px">현재</td><td style="text-align:right;padding:4px">변화</td></tr>
        <tr><td style="padding:6px 4px;border-top:1px solid var(--bd)">주간 볼륨</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${lastWkV?lastWkV.toLocaleString()+'kg':'-'}</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd);color:var(--a);font-weight:600">${thisWkV?thisWkV.toLocaleString()+'kg':'-'}</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${cmpArrow(thisWkV,lastWkV)}</td></tr>
        <tr><td style="padding:6px 4px;border-top:1px solid var(--bd)">주간 운동일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${lastWkD}일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd);color:var(--a);font-weight:600">${thisWkD}일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${cmpArrow(thisWkD,lastWkD)}</td></tr>
        <tr><td style="padding:6px 4px;border-top:1px solid var(--bd)">월간 볼륨</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${lastMoV?lastMoV.toLocaleString()+'kg':'-'}</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd);color:var(--a);font-weight:600">${thisMoV?thisMoV.toLocaleString()+'kg':'-'}</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${cmpArrow(thisMoV,lastMoV)}</td></tr>
        <tr><td style="padding:6px 4px;border-top:1px solid var(--bd)">월간 운동일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${lastMoD}일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd);color:var(--a);font-weight:600">${thisMoD}일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${cmpArrow(thisMoD,lastMoD)}</td></tr>
      </table>
    </div>`;

  // Weekly volume chart (last 8 weeks)
  const weeks=[];for(let i=7;i>=0;i--){const d=new Date();d.setDate(d.getDate()-d.getDay()-i*7);weeks.push(d);}
  const wVols=weeks.map(ws=>{const we2=new Date(ws.getTime()+7*864e5);return L.filter(l=>{const ld=new Date(l.date+'T00:00:00');return ld>=ws&&ld<we2&&l.type==='weight'}).reduce((s,l)=>s+logVol(l),0);});
  const wMax=Math.max(...wVols,1);
  if(totalVol>0){
    document.getElementById('hchart').innerHTML=`<div class="cd"><div style="font-size:13px;font-weight:700;margin-bottom:12px">주간 볼륨 추이 (8주)</div><div style="display:flex;gap:6px">${wVols.map((v,i)=>{const pct=Math.max(v/wMax*100,5);const wk=new Date(weeks[i]);const isLast=i===wVols.length-1;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:9px;color:${isLast?'var(--o)':'var(--a)'};font-weight:600;margin-bottom:4px;min-height:14px">${v?Math.round(v).toLocaleString():''}</div><div style="width:100%;height:80px;display:flex;align-items:flex-end"><div style="width:100%;height:${pct}%;background:${isLast?'var(--o)':'var(--a)'};border-radius:3px 3px 0 0;min-height:4px"></div></div><div style="font-size:9px;color:var(--td);margin-top:4px">${wk.getMonth()+1}/${wk.getDate()}</div></div>`}).join('')}</div></div>`;
  }else document.getElementById('hchart').innerHTML='';

  // Deep insights (body-part analysis) with period toggle
  document.getElementById('ip14').className=insDays===14?'on':'';
  document.getElementById('ip30').className=insDays===30?'on':'';
  document.getElementById('hins').innerHTML=L.length?renderInsights(analyze(insDays)):'<p style="color:var(--td);font-size:13px;padding:10px 0">기록이 쌓이면 분석이 표시됩니다.</p>';

  // Log list grouped by session with h:m duration
  const el=document.getElementById('hls');if(!L.length){el.innerHTML='<p style="color:var(--td);text-align:center;padding:20px">기록 없음</p>';return;}
  const sessions=groupSessions();
  el.innerHTML=sessions.map(g=>`<div style="margin-bottom:20px"><div style="font-size:14px;font-weight:700;color:var(--a);margin-bottom:8px">${g.date}${g.startedAt?' · '+(todBadge(g.startedAt)?todBadge(g.startedAt)+' ':'')+g.startedAt:''}${g.completedAt?' → '+g.completedAt:''}${g.duration?' · '+fDur2(g.duration):''}</div>${g.logs.map(l=>`<div class="cd" style="padding:12px;margin-bottom:8px"><div class="fb"><div style="font-weight:600;font-size:14px">${esc(l.exerciseName)}${l.dumb==='one'?' <span class="bg bo">한쪽</span>':''}</div><div style="display:flex;gap:4px"><button class="bi" onclick="edLog('${l.id}')">✏️</button><button class="bi dg" onclick="dLog('${l.id}')">🗑</button></div></div><div style="font-size:13px;color:var(--td);margin-top:6px">${fFull(l)}</div></div>`).join('')}${g.memo?`<div style="font-size:12px;color:var(--p);margin:0 4px 8px;padding:8px 12px;background:var(--pd);border-radius:10px">📝 ${esc(g.memo)}</div>`:''}</div>`).join('');
}

function calcStreak(){
  const dates=[...new Set(L.map(l=>l.date))].sort();if(!dates.length)return 0;
  let streak=0;const now=new Date();
  for(let w=0;w<52;w++){
    const ws=new Date(now);ws.setDate(now.getDate()-now.getDay()-w*7);
    const we=new Date(ws.getTime()+7*864e5);
    const has=dates.some(d=>{const dt=new Date(d+'T00:00:00');return dt>=ws&&dt<we;});
    if(has)streak++;else break;
  }
  return streak;
}

function fFull(l){if(l.type==='hold')return l.sets.map((s,i)=>`${i?' → ':''}${s.sec||s.holdSec||'?'}초`).join('');if(l.type==='weight')return l.sets.map((s,i)=>`${i?' → ':''}${dW(s.weight,s.lb)}×${s.reps}회`).join('');return l.sets.map((s,i)=>`${i?' → ':''}${s.reps}회`).join('');}
// ═══ CUSTOM DELETE MODAL (iOS PWA compatible) ═══
let pendingDel=null;
function showDelModal(msg,cb){pendingDel=cb;document.getElementById('oDelMsg').textContent=msg;document.getElementById('oDel').style.display='flex';}
function closeDelModal(){pendingDel=null;document.getElementById('oDel').style.display='none';}
function execDel(){if(pendingDel)pendingDel();closeDelModal();}

function dLog(id){
  const log=L.find(l=>l.id===id);if(!log)return;
  showDelModal(log.exerciseName+' ('+log.date+') 기록을 삭제할까요?',()=>{
    dD('logs',id).then(()=>{L=L.filter(l=>l.id!==id);rHist();}).catch(e=>{});
  });
}
function edLog(id){eLId=id;rEdLog();}
function rEdLog(){
  const log=L.find(l=>l.id===eLId);if(!log)return;
  let h=`<div class="cd"><div style="font-weight:700;font-size:16px;margin-bottom:6px">${esc(log.exerciseName)}${log.dumb==='one'?' 🔸한쪽':''}</div><div style="font-size:13px;color:var(--td);margin-bottom:12px">${log.date}${log.startedAt?' · '+log.startedAt:''}</div>`;
  if(log.type==='hold'){
    h+=`<div style="display:grid;grid-template-columns:30px 1fr 40px 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--td);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--td)">시간(초)</span><span></span><span></span></div>`;
    log.sets.forEach((s,i)=>{h+=`<div style="display:grid;grid-template-columns:30px 1fr 40px 32px;gap:8px;align-items:center;margin-bottom:8px"><span style="font-weight:700;color:var(--a);text-align:center">${i+1}</span><input type="number" inputmode="numeric" class="si" value="${s.sec||s.holdSec||''}" onchange="eLSet(${i},'sec',this.value)"><span style="color:var(--td);font-size:13px">초</span>${log.sets.length>1?`<button class="bi dg" onclick="delELSet(${i})">✕</button>`:'<span></span>'}</div>`;});
  }else if(log.type==='weight'){
    h+=`<div style="display:grid;grid-template-columns:30px 1fr 1fr 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--td);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--td)">무게(kg)</span><span style="font-size:11px;font-weight:700;color:var(--td)">횟수</span><span></span></div>`;
    log.sets.forEach((s,i)=>{h+=`<div style="display:grid;grid-template-columns:30px 1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:8px"><span style="font-weight:700;color:var(--a);text-align:center">${i+1}</span><input type="number" inputmode="decimal" class="si" value="${s.weight}" onchange="eLSet(${i},'weight',this.value)" placeholder="kg"><input type="number" inputmode="numeric" class="si" value="${s.reps}" onchange="eLSet(${i},'reps',this.value)" placeholder="횟수">${log.sets.length>1?`<button class="bi dg" onclick="delELSet(${i})">✕</button>`:'<span></span>'}</div>`;});
  }else{
    h+=`<div style="display:grid;grid-template-columns:30px 1fr 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--td);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--td)">횟수</span><span></span></div>`;
    log.sets.forEach((s,i)=>{h+=`<div style="display:grid;grid-template-columns:30px 1fr 32px;gap:8px;align-items:center;margin-bottom:8px"><span style="font-weight:700;color:var(--a);text-align:center">${i+1}</span><input type="number" inputmode="numeric" class="si" value="${s.reps}" onchange="eLSet(${i},'reps',this.value)" placeholder="횟수">${log.sets.length>1?`<button class="bi dg" onclick="delELSet(${i})">✕</button>`:'<span></span>'}</div>`;});
  }
  h+=`<button class="bs" style="margin-top:6px;font-size:13px;padding:10px" onclick="addELSet()">+ 세트 추가</button>`;
  h+=`<div style="margin-top:16px"><label class="lb">메모</label><textarea id="elm" style="min-height:60px">${esc(log._tmpMemo!=null?log._tmpMemo:(log.memo||''))}</textarea></div></div><button class="bp" style="margin-top:12px" onclick="saveEL()">수정 완료</button>`;
  document.getElementById('elc').innerHTML=h;nav('el');
}
function eLSet(si,f,v){const log=L.find(l=>l.id===eLId);if(log)log.sets[si][f]=v;}
function addELSet(){const log=L.find(l=>l.id===eLId);if(!log)return;const last=log.sets[log.sets.length-1]||{};if(log.type==='hold')log.sets.push({sec:last.sec||last.holdSec||''});else if(log.type==='weight')log.sets.push({weight:last.weight||'',reps:last.reps||'',lb:last.lb||'',origW:last.origW||'',dumb:last.dumb});else log.sets.push({reps:last.reps||''});preserveELMemo();rEdLog();}
function delELSet(si){const log=L.find(l=>l.id===eLId);if(!log||log.sets.length<=1)return;preserveELMemo();log.sets.splice(si,1);rEdLog();}
function preserveELMemo(){const el=document.getElementById('elm');const log=L.find(l=>l.id===eLId);if(el&&log)log._tmpMemo=el.value;}
async function saveEL(){const log=L.find(l=>l.id===eLId);if(!log)return;log.memo=document.getElementById('elm').value.trim();delete log._tmpMemo;await dP('logs',log);eLId=null;nav('hs');}

// ═══ BACKUP/RESTORE ═══
function doBackup(){const data={version:1,date:new Date().toISOString(),exercises:E,programs:P,logs:L};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='workout_backup_'+tod().replace(/-/g,'')+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);const m=document.getElementById('bmsg');m.style.display='block';m.style.color='var(--a)';m.textContent='✓ 백업 완료!';setTimeout(()=>m.style.display='none',5000);}
async function doRestore(input){const file=input.files[0];if(!file)return;const m=document.getElementById('bmsg');try{const text=await file.text();const data=JSON.parse(text);if(!data.exercises||!data.logs)throw new Error('올바른 백업 파일이 아닙니다.');
  showDelModal('백업 데이터를 복원할까요?\n기존 데이터와 합쳐집니다.',async()=>{try{for(const ex of data.exercises)await dP('exercises',ex);for(const p of(data.programs||[])){if(p.days)p.days=p.days.map(d=>({l:d.l||d.label||'',e:d.e||d.eids||d.exerciseIds||[]}));await dP('programs',p);}for(const l of data.logs){if(!l.ts&&l.timestamp)l.ts=l.timestamp;await dP('logs',l);}E=await dA('exercises');E=sortE(E);P=(await dA('programs')).map(normP);L=(await dA('logs')).map(normL);m.style.display='block';m.style.color='var(--a)';m.textContent='✓ 복원 완료!';rHist();setTimeout(()=>m.style.display='none',5000);}catch(e2){m.style.display='block';m.style.color='var(--w)';m.textContent='❌ '+e2.message;setTimeout(()=>m.style.display='none',5000);}});
  }catch(e){m.style.display='block';m.style.color='var(--w)';m.textContent='❌ '+e.message;setTimeout(()=>m.style.display='none',5000);}input.value='';}

init();
</script>
