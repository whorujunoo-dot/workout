<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WORKOUT">
<meta name="theme-color" content="#0a0a0f">
<title>WORKOUT</title>
<style>
:root{--bg:#0a0a0f;--card:#14141f;--a:#00e5a0;--ad:rgba(0,229,160,.15);--ag:rgba(0,229,160,.3);--w:#ff6b6b;--wd:rgba(255,107,107,.15);--t:#e8e8f0;--td:#6b6b80;--bd:#22223a;--o:#ffaa40;--od:rgba(255,170,64,.15);--bl:#4da6ff;--bld:rgba(77,166,255,.15);--p:#b18cff;--pd:rgba(177,140,255,.15)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;max-width:500px;margin:0 auto;-webkit-font-smoothing:antialiased;overscroll-behavior:none;padding-bottom:90px;padding-top:env(safe-area-inset-top,0)}
.pg{display:none;padding:24px 16px}.pg.on{display:block}
.cd{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;border:1px solid var(--bd)}
.bp{background:var(--a);color:#0a0a0f;border:none;border-radius:12px;padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}.bp:active{transform:scale(.97)}
.bs{background:0 0;color:var(--a);border:1.5px solid var(--a);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
.bi{background:0 0;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;color:var(--td)}.bi.dg{color:var(--w)}
input,textarea{background:#0d0d18;border:1.5px solid var(--bd);border-radius:10px;padding:12px 14px;color:var(--t);font-size:15px;width:100%;outline:none;font-family:inherit}input:focus,textarea:focus{border-color:var(--a)}input::placeholder,textarea::placeholder{color:var(--td)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.ch{display:inline-flex;align-items:center;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:0 0;color:var(--td);white-space:nowrap;font-family:inherit}.ch.on{border-color:var(--a);background:var(--ad);color:var(--a)}.ch.oo{border-color:var(--o);background:var(--od);color:var(--o)}
.bg{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}.ba{background:var(--ad);color:var(--a)}.bo{background:var(--od);color:var(--o)}.bb{background:var(--bld);color:var(--bl)}.bpp{background:var(--pd);color:var(--p)}
.lb{font-size:13px;font-weight:600;color:var(--td);display:block;margin-bottom:6px}
.fb{display:flex;justify-content:space-between;align-items:center}.fw{display:flex;gap:6px;flex-wrap:wrap}
.tg{display:flex;background:#0d0d18;border-radius:10px;border:1.5px solid var(--bd);overflow:hidden}.tg button{flex:1;padding:8px 12px;font-size:13px;font-weight:600;border:none;background:0 0;color:var(--td);cursor:pointer;font-family:inherit}.tg button.on{background:var(--a);color:#0a0a0f}
.tb{position:fixed;bottom:12px;left:12px;right:12px;max-width:476px;margin:0 auto;background:rgba(20,20,31,.92);border:1px solid var(--bd);border-radius:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:50;padding:4px}
.tb-i{display:flex}
.tbn{flex:1;background:0 0;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0;cursor:pointer;color:var(--td);font-family:inherit;border-radius:16px}.tbn.on{color:var(--a);background:rgba(0,229,160,.08)}.tbn span{font-size:10px;font-weight:600}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.si{padding:10px 8px;font-size:15px;font-weight:600;text-align:center}
.yt-t{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:16/9;background:#000}.yt-t img{width:100%;height:100%;object-fit:cover}
.yt-p{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4)}.yt-p svg{width:48px;height:48px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.ch2{font-size:11px;font-weight:700;color:var(--td);padding:6px 0}
.cd2{font-size:13px;padding:8px 0;border-radius:8px;position:relative;color:var(--td);cursor:pointer}.cd2.cm{color:var(--t)}.cd2.tod{font-weight:800;color:var(--a)}.cd2.hw::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--a)}
.moti{background:linear-gradient(135deg,#1a1a30,#14142a);border:1px solid rgba(177,140,255,.2);border-radius:16px;padding:20px;margin-bottom:20px;text-align:center}.moti .q{font-size:16px;font-weight:600;line-height:1.6}
/* Current set highlight */
.set-active{background:rgba(0,229,160,.08);border-radius:8px;padding:4px 2px;margin-bottom:2px}
.set-done{opacity:.45;margin-bottom:2px}
/* Mini chart */
.mchart{display:flex;gap:6px;overflow-x:auto;padding:0 4px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.mchart .bar-w{display:flex;flex-direction:column;align-items:center;min-width:48px;width:48px;flex-shrink:0}
.mchart .bar-area{width:100%;height:25vw;max-height:140px;min-height:100px;display:flex;align-items:flex-end}
.mchart .bar{width:100%;background:var(--a);border-radius:4px 4px 0 0;min-height:4px}
.mchart .bar.today{background:var(--o)}
.mchart .bar-lb{font-size:9px;color:var(--td);margin-top:5px;text-align:center;white-space:nowrap}
.mchart .bar-val{font-size:9px;color:var(--a);text-align:center;font-weight:600;margin-top:1px}
/* Stats */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.stat-box .n{font-size:24px;font-weight:800;color:var(--a)}.stat-box .l{font-size:11px;color:var(--td);margin-top:2px}
</style>
</head>
<body>

<!-- HOME -->
<div id="p-home" class="pg on">
  <div style="margin-bottom:20px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="2"><path d="M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a6 6 0 1 0 12 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-4 2z"/></svg><h1 style="font-size:26px;font-weight:800;letter-spacing:-.02em">WORKOUT</h1></div><p id="hd0" style="color:var(--td);font-size:13px;margin-left:32px"></p></div>
  <div id="hmot"></div>
  <div class="cd" style="background:linear-gradient(135deg,var(--card),#1a1a30);border-color:var(--ag)"><div style="font-size:15px;font-weight:700;margin-bottom:12px">▶ 빠른 시작</div><p style="color:var(--td);font-size:13px;margin:0 0 14px">운동을 직접 골라서 시작</p><button class="bp" onclick="nav('qs')">운동 선택하기</button></div>
  <div style="margin-top:20px"><div class="fb" style="margin-bottom:12px"><h2 style="font-size:17px;font-weight:700">내 프로그램</h2><button onclick="openPF()" style="background:0 0;border:none;color:var(--a);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit">+ 추가</button></div><div id="hpg"></div></div>
  <div style="margin-top:20px"><h2 style="font-size:17px;font-weight:700;margin-bottom:12px">최근 기록</h2><div id="hrc"></div></div>
</div>

<!-- QUICK SELECT -->
<div id="p-qs" class="pg"><div style="display:flex;align-items:center;gap:8px;margin-bottom:20px"><button class="bi" onclick="nav('home')">◀</button><h2 style="font-size:20px;font-weight:800">운동 선택</h2></div><div id="qls"></div><div id="qfl" style="display:none;position:fixed;bottom:90px;left:16px;right:16px;max-width:468px;margin:0 auto;z-index:40"><button class="bp" style="box-shadow:0 0 30px var(--ag)" onclick="startFQ()"><span id="qc"></span>개 운동 시작</button></div></div>

<!-- EXERCISES -->
<div id="p-ex" class="pg"><div class="fb" style="margin-bottom:20px"><h2 style="font-size:20px;font-weight:800">운동 목록</h2><button onclick="openEF()" style="background:var(--ad);border:none;color:var(--a);cursor:pointer;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;font-family:inherit">+ 추가</button></div><div id="exl"></div></div>

<!-- EXERCISE FORM -->
<div id="p-exf" class="pg"><div style="display:flex;align-items:center;gap:8px;margin-bottom:24px"><button class="bi" onclick="nav('ex')">◀</button><h2 id="eft">운동 추가</h2></div><div style="margin-bottom:16px"><label class="lb">운동 이름</label><input id="efn" placeholder="예: 벤치프레스"></div><div style="margin-bottom:16px"><label class="lb" style="margin-bottom:8px">유형</label><div class="fw" id="eftp"></div></div><div style="margin-bottom:16px"><label class="lb">카테고리</label><input id="efc" placeholder="예: 가슴, 등, 하체"><div id="efcc" class="fw" style="margin-top:8px"></div></div><div style="margin-bottom:24px"><label class="lb">참고 영상 (YouTube)</label><div id="efv"></div><button class="bs" style="font-size:13px;padding:10px 16px;margin-top:8px" onclick="VI.push('');rEF()">+ 영상 추가</button></div><button class="bp" onclick="saveE()" id="efb">추가하기</button></div>

<!-- PROGRAM FORM -->
<div id="p-pf" class="pg"><div style="display:flex;align-items:center;gap:8px;margin-bottom:24px"><button class="bi" onclick="nav('home')">◀</button><h2 id="pft">프로그램 추가</h2></div><div style="margin-bottom:16px"><label class="lb">프로그램 이름</label><input id="pfn" placeholder="예: 주 3일 분할"></div><div id="pfd"></div><button class="bs" onclick="PD.push({l:'',e:[]});rPD()" style="margin-bottom:16px">+ Day 추가</button><button class="bp" onclick="saveP()" id="pfb">저장</button></div>

<!-- SESSION -->
<div id="p-ss" class="pg"><div id="ssc"></div></div>

<!-- MEMO -->
<div id="p-mm" class="pg"><div style="text-align:center;margin-bottom:24px"><div style="font-size:48px;margin-bottom:8px">🔥</div><h2 style="font-size:24px;font-weight:800">운동 완료!</h2><p id="mmi" style="color:var(--td);font-size:14px;margin-top:4px"></p><p id="mmt" style="color:var(--a);font-size:13px;margin-top:4px"></p></div><div style="margin-bottom:16px"><label class="lb">오늘의 메모 / 피드백</label><textarea id="mmtx" placeholder="컨디션, 느낀점, 다음에 개선할 점..."></textarea></div><button class="bp" onclick="saveMemo()">저장하고 인사이트 보기</button></div>

<!-- SUMMARY -->
<div id="p-sm" class="pg"><div id="smc"></div></div>

<!-- CALENDAR -->
<div id="p-cl" class="pg"><div class="fb" style="margin-bottom:16px"><h2 style="font-size:20px;font-weight:800">캘린더</h2><div class="tg" style="width:100px"><button id="cvw" onclick="CV='week';rCal()">주</button><button id="cvm" class="on" onclick="CV='month';rCal()">월</button></div></div><div id="cst" class="stat-row"></div><div class="cd" style="padding:14px"><div class="fb" style="margin-bottom:12px"><button class="bi" onclick="calN(-1)">◀</button><span id="ctt" style="font-size:15px;font-weight:700"></span><button class="bi" onclick="calN(1)">▶</button></div><div id="cbd"></div></div><div id="cdt" style="margin-top:12px"></div></div>

<!-- HISTORY -->
<div id="p-hs" class="pg">
  <h2 style="font-size:20px;font-weight:800;margin-bottom:16px">기록 & 성과</h2>
  <div id="hstat"></div>
  <div id="hchart" style="margin-bottom:16px"></div>
  <div class="fb" style="margin-bottom:12px">
    <h3 style="font-size:15px;font-weight:700">전체 기록</h3>
    <div style="display:flex;gap:6px">
      <button onclick="doBackup()" style="background:var(--ad);border:none;color:var(--a);cursor:pointer;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;font-family:inherit">📤 백업</button>
      <button onclick="document.getElementById('rf').click()" style="background:var(--bld);border:none;color:var(--bl);cursor:pointer;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;font-family:inherit">📥 복원</button>
    </div>
  </div>
  <input type="file" id="rf" accept=".json" style="display:none" onchange="doRestore(this)">
  <div id="bmsg" style="font-size:12px;color:var(--a);margin-bottom:10px;display:none"></div>
  <div id="hls"></div>
</div>

<!-- EDIT LOG -->
<div id="p-el" class="pg"><div style="display:flex;align-items:center;gap:8px;margin-bottom:24px"><button class="bi" onclick="nav('hs')">◀</button><h2>기록 수정</h2></div><div id="elc"></div></div>

<!-- ADD EXERCISE MID-SESSION -->
<div id="p-addex" class="pg"><div style="display:flex;align-items:center;gap:8px;margin-bottom:20px"><button class="bi" onclick="nav('ss');rSess()">◀</button><h2 style="font-size:20px;font-weight:800">운동 추가</h2></div><div id="axl"></div></div>

<!-- OVERLAYS -->
<div id="oR" class="ov" style="display:none">
  <div style="position:relative;width:220px;height:220px;margin-bottom:16px">
    <svg width="220" height="220" style="transform:rotate(-90deg)"><circle cx="110" cy="110" r="90" fill="none" stroke="var(--bd)" stroke-width="10"/><circle id="rc" cx="110" cy="110" r="90" fill="none" stroke="var(--a)" stroke-width="10" stroke-dasharray="565.49" stroke-dashoffset="0" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/></svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><div id="rd" style="font-size:52px;font-weight:800;color:var(--a);font-variant-numeric:tabular-nums">0:00</div><div style="font-size:13px;color:var(--td);margin-top:4px">쉬는 시간</div></div>
  </div>
  <div id="rMsg" style="font-size:14px;color:var(--o);text-align:center;margin-bottom:16px;padding:0 20px;line-height:1.5"></div>
  <button class="bs" style="width:auto;padding:10px 32px" onclick="stopR()">건너뛰기</button>
</div>

<div id="oH" class="ov" style="display:none"><div id="hlb" style="font-size:14px;color:var(--td);margin-bottom:8px"></div><div id="hdd" style="font-size:56px;font-weight:800;color:var(--o);font-variant-numeric:tabular-nums">0</div><div style="font-size:14px;color:var(--td);margin-top:4px;margin-bottom:24px">초</div><div style="display:flex;gap:12px"><button class="bs" style="width:auto;padding:10px 24px" onclick="stopH(false)">취소</button><button class="bp" style="width:auto;padding:10px 24px" onclick="stopH(true)">완료</button></div></div>

<div id="oV" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:20px"><div id="vde" style="border-radius:12px;overflow:hidden;aspect-ratio:16/9;width:100%;max-width:480px"></div><button onclick="clV()" style="margin-top:24px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;border-radius:50px;padding:14px 40px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">닫기</button></div>

<!-- TAB BAR -->
<div class="tb" id="tb"><div class="tb-i">
  <button class="tbn on" data-t="home" onclick="nav('home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>홈</span></button>
  <button class="tbn" data-t="ex" onclick="nav('ex')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5h11M6.5 17.5h11"/></svg><span>운동</span></button>
  <button class="tbn" data-t="cl" onclick="nav('cl')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>캘린더</span></button>
  <button class="tbn" data-t="hs" onclick="nav('hs')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>기록</span></button>
</div></div>

<script>
// ═══ DB ═══ (이름 절대 변경 금지!)
const DB='WorkoutApp',DBV=3;
function odb(){return new Promise((r,j)=>{const q=indexedDB.open(DB,DBV);q.onupgradeneeded=e=>{const d=e.target.result;['exercises','programs','settings'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='settings'?'key':'id'})});if(!d.objectStoreNames.contains('logs')){const s=d.createObjectStore('logs',{keyPath:'id'});s.createIndex('date','date')}};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dA(s){const d=await odb();return new Promise((r,j)=>{const t=d.transaction(s);const q=t.objectStore(s).getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>j(q.error)})}
async function dP(s,o){const d=await odb();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(o);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}
async function dD(s,k){const d=await odb();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}

let E=[],P=[],L=[];
let qS=[],edE=null,edP=null,eT='weight',PD=[{l:'',e:[]}],VI=[];
let sE=[],sI=0,sStart=0,sU='kg',curSet={},sessId=''; // sessId = unique per workout session
let rI=null,rL=0,rT=0;
let hI=null,hL=0,hCb=null;
let CV='month',cY,cM,cWeekRef=null; // cWeekRef = Date for week view reference
let fDur=0,fTime='';
let eLId=null;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const tod=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const fD=d=>{const t=new Date(d+'T00:00:00');return(t.getMonth()+1)+'/'+t.getDate()};
const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):'';
const L2K=0.453592;
function pW(v,u){const s=String(v).trim();if(u==='lb'){const n=parseFloat(s);if(isNaN(n))return{kg:'',lb:''};return{kg:String(Math.round(n*L2K*10)/10),lb:String(Math.round(n*10)/10)}}return{kg:s,lb:''}}
function dW(kg,lb){if(lb)return kg+'kg('+lb+'lb)';return kg?kg+'kg':'';}
function yid(u){if(!u)return null;const m=u.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&?\s]+)/);return m?m[1]:null}
function opV(u){const id=yid(u);if(!id)return;document.getElementById('vde').innerHTML='<iframe width="100%" style="aspect-ratio:16/9;border:none" src="https://www.youtube.com/embed/'+id+'?autoplay=1&playsinline=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>';document.getElementById('oV').style.display='flex';}

const QT=["고통은 일시적이다. 포기는 영원하다.","어제보다 1%만 더 강해지면 된다.","지금 흘리는 땀이 내일의 자신감.","꾸준함이 몸을 바꾼다.","운동을 후회한 사람은 없다.","바벨을 들어올려라.","포기하고 싶을 때가 성장의 시작.","한 번 더. 항상 한 번 더.","근육은 배신하지 않는다.","한계는 머릿속에만 존재한다.","결과는 반드시 온다.","딱 한 세트만 더.","오늘의 고통이 내일의 파워.","오늘도 해낸 나, 대단하다.","운동은 가장 확실한 투자다.","내일의 나는 오늘의 내가 만든다."];

function tQ(){const d=new Date(),n=Math.floor((d-new Date(d.getFullYear(),0,0))/864e5);return QT[n%QT.length]}
function gLL(eid){return L.filter(l=>l.exerciseId===eid).sort((a,b)=>(b.ts||b.timestamp||0)-(a.ts||a.timestamp||0))[0]||null}
function getLast10(eid){return L.filter(l=>l.exerciseId===eid).sort((a,b)=>(a.ts||a.timestamp||0)-(b.ts||b.timestamp||0)).slice(-10)}
function normP(p){if(p.days)p.days=p.days.map(d=>({l:d.l||d.label||'',e:d.e||d.eids||d.exerciseIds||[]}));return p}
function normL(l){if(!l.ts&&l.timestamp)l.ts=l.timestamp;if(l.sets)l.sets=l.sets.map(s=>{if(s.holdSec&&!s.sec)s.sec=s.holdSec;return s;});return l}

// Group logs by session (sessId or date fallback)
function groupSessions(){
  const groups={};
  L.forEach(l=>{
    const key=l.sessId||l.date;
    if(!groups[key])groups[key]={date:l.date,logs:[],completedAt:l.completedAt,startedAt:l.startedAt,duration:l.duration,memo:l.memo,sessId:l.sessId,ts:l.ts||0};
    groups[key].logs.push(l);
    if((l.ts||0)>groups[key].ts){groups[key].ts=l.ts;groups[key].completedAt=l.completedAt||groups[key].completedAt;groups[key].duration=l.duration||groups[key].duration;groups[key].memo=l.memo||groups[key].memo;groups[key].startedAt=l.startedAt||groups[key].startedAt;}
  });
  return Object.values(groups).sort((a,b)=>b.ts-a.ts);
}

// Volume calc
function logVol(l){
  if(l.type==='hold')return l.sets.reduce((s,x)=>s+(parseInt(x.sec||x.holdSec)||0),0);
  if(l.type==='weight')return l.sets.reduce((s,x)=>s+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0);
  return l.sets.reduce((s,x)=>s+(parseInt(x.reps)||0),0);
}

// Auto save
async function autoSave(){
  if(!sE.length)return;const dt=tod(),now=Date.now();
  for(const ex of sE){
    let valid;
    if(ex.type==='hold')valid=ex.sets.filter(s=>s.sec&&s.sec!=='');
    else valid=ex.sets.filter(s=>s.reps&&s.reps!=='');
    if(!valid.length)continue;
    const sets=valid.map(s=>{
      if(ex.type==='weight'){const raw=parseFloat(s.kg)||0;const actual=ex.dumb==='one'?Math.round(raw*2*10)/10:raw;return{weight:String(actual),origW:s.kg,lb:s.lb||'',reps:s.reps,dumb:ex.dumb};}
      return{...s,dumb:ex.dumb};
    });
    const dur=Math.round((Date.now()-sStart)/60000);
    const stTime=new Date(sStart);const stStr=stTime.getHours().toString().padStart(2,'0')+':'+stTime.getMinutes().toString().padStart(2,'0');
    const entry={id:ex._lid||uid(),exerciseId:ex.id,exerciseName:ex.name,type:ex.type,date:dt,sets,restSec:ex.restSec,ts:now,dumb:ex.dumb,duration:dur,sessId:sessId,startedAt:stStr};
    if(!ex._lid)ex._lid=entry.id;
    await dP('logs',entry);const idx=L.findIndex(l=>l.id===entry.id);if(idx>=0)L[idx]=entry;else L.push(entry);
  }
}
setInterval(autoSave,30000);

function fSS(l){
  if(l.type==='hold')return'('+l.sets.map(s=>(s.sec||s.holdSec||'?')+'초').join(', ')+')';
  if(l.type==='weight')return'('+l.sets.map(s=>dW(s.weight,s.lb)+'×'+s.reps).join(', ')+')';
  return'('+l.sets.map(s=>s.reps+'회').join(', ')+')';
}

// ═══ MINI CHART ═══
function miniChart(eid,type,todayEx){
  const data=L.filter(l=>l.exerciseId===eid).sort((a,b)=>(a.ts||a.timestamp||0)-(b.ts||b.timestamp||0));
  const vals=data.map(l=>logVol(l));
  let todayVol=0;
  if(todayEx&&type==='weight'){
    todayEx.sets.forEach(s=>{const w=parseFloat(s.kg)||0;const r=parseInt(s.reps)||0;const a=todayEx.dumb==='one'?w*2:w;todayVol+=a*r;});
  }else if(todayEx&&type==='bodyweight'){
    todayVol=todayEx.sets.reduce((s,x)=>s+(parseInt(x.reps)||0),0);
  }else if(todayEx&&type==='hold'){
    todayVol=todayEx.sets.reduce((s,x)=>s+(parseInt(x.sec)||0),0);
  }
  const allVals=[...vals];if(todayVol)allVals.push(todayVol);
  if(!allVals.length)return'';
  const max=Math.max(...allVals,1);
  const unit=type==='weight'?'kg':type==='hold'?'초':'회';
  const mcId='mc'+eid.replace(/[^a-z0-9]/gi,'');
  let bars=data.map((l,i)=>{const pct=Math.max(vals[i]/max*100,5);return`<div class="bar-w"><div class="bar-area"><div class="bar" style="height:${pct}%"></div></div><div class="bar-lb">${fD(l.date)}</div><div class="bar-val">${Math.round(vals[i])}${unit}</div></div>`}).join('');
  if(todayVol){const pct=Math.max(todayVol/max*100,5);bars+=`<div class="bar-w"><div class="bar-area"><div class="bar today" style="height:${pct}%"></div></div><div class="bar-lb" style="color:var(--o)">오늘</div><div class="bar-val" style="color:var(--o)">${Math.round(todayVol)}${unit}</div></div>`;}
  const cnt=data.length+(todayVol?1:0);
  const hint=cnt>5?'<div style="font-size:10px;color:var(--td);margin-top:6px">← 스크롤하여 이전 기록 보기</div>':'';
  return`<div class="cd" style="padding:14px;margin:16px 0"><div style="font-size:12px;font-weight:700;color:var(--td);margin-bottom:10px">기록 추이 (${data.length}회${todayVol?' + 오늘 예상':''})</div><div class="mchart" id="${mcId}">${bars}</div>${hint}</div><script>setTimeout(()=>{const el=document.getElementById('${mcId}');if(el)el.scrollLeft=el.scrollWidth;},50)<\/script>`;
}

// ═══ EXPECTED VOLUME ═══
function expectedVol(ex){
  if(ex.type!=='weight')return'';
  let total=0;
  ex.sets.forEach(s=>{
    const w=parseFloat(s.kg)||0;
    const r=parseInt(s.reps)||0;
    const actual=ex.dumb==='one'?w*2:w;
    total+=actual*r;
  });
  if(!total)return'';
  return`<div style="font-size:12px;color:var(--o);margin-top:6px">📊 예상 총 볼륨: <b>${Math.round(total)}kg</b></div>`;
}

function addExToSession(id){
  const e=E.find(x=>x.id===id);if(!e)return;
  const last=gLL(id);
  let sets;
  if(e.type==='hold')sets=last?last.sets.map(s=>({sec:s.sec||s.holdSec||''})):[{sec:''}];
  else if(e.type==='weight')sets=last?last.sets.map(s=>({kg:s.origW||s.weight||'',reps:s.reps||'',lb:s.lb||''})):[{kg:'',reps:'',lb:''}];
  else sets=last?last.sets.map(s=>({reps:s.reps||''})):[{reps:''}];
  sE.push({...e,sets,restSec:last?(last.restSec||60):60,dumb:last?(last.dumb||'both'):'both',_lid:null});
  nav('ss');rSess();
}

function rSess(){
  const ex=sE[sI];if(!ex)return;const last=gLL(ex.id);
  const rM=Math.floor(ex.restSec/60),rSc=ex.restSec%60;
  const vs=(ex.videos||[]).filter(v=>yid(v));

  const tl=ex.type==='weight'?'웨이트':ex.type==='hold'?'버티기':'맨몸',tb=ex.type==='weight'?'ba':ex.type==='hold'?'bpp':'bo';

    if(ex.dumb==='one')h+=`<div style="font-size:12px;color:var(--o);margin-bottom:10px">🔸 한쪽 무게 입력 → 기록은 양쪽(×2) 계산</div>`;
  }

  // Videos
  if(vs.length)h+=`<div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:14px">${vs.map(v=>`<div class="yt-t" style="width:130px;flex-shrink:0" onclick="opV('${esc(v)}')"><img src="https://img.youtube.com/vi/${yid(v)}/mqdefault.jpg" loading="lazy"><div class="yt-p"><svg viewBox="0 0 68 48"><path d="M66.52 7.74c-.78-2.93-2.49-5.41-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55c-2.93.78-4.64 3.26-5.42 6.19C.06 13.05 0 24 0 24s.06 10.95 1.48 16.26c.78 2.93 2.49 5.41 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55c2.93-.78 4.64-3.26 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="red"/><path d="M45 24L27 14v20" fill="white"/></svg></div></div>`).join('')}</div>`;

  // Previous record with "days ago" label
  if(last){
    const daysAgo=Math.floor((new Date()-new Date(last.date+'T00:00:00'))/(864e5));
    const agoTxt=daysAgo===0?'오늘':daysAgo===1?'어제':daysAgo+'일 전';
    h+=`<div class="cd" style="background:var(--bld);border:1px solid rgba(77,166,255,.2);padding:12px;margin-bottom:14px;border-radius:12px"><div style="font-size:11px;font-weight:700;color:var(--bl);margin-bottom:4px">이전 기록 (${fD(last.date)} · ${agoTxt})${last.dumb==='one'?' 🔸한쪽':''}</div><div style="font-size:13px">${fSS(last)}</div></div>`;
  }

  // Sets with current set indicator
  h+=`<div style="margin-bottom:12px">`;
  if(ex.type==='hold'){
    h+=`<div style="display:grid;grid-template-columns:36px 1fr 50px 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--td);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--td)">목표(초)</span><span></span><span></span></div>`;
    ex.sets.forEach((s,si)=>{
      const cls=si<csi?'set-done':si===csi?'set-active':'';
      h+=`<div class="${cls}" style="display:grid;grid-template-columns:36px 1fr 50px 32px;gap:8px;align-items:center;margin-bottom:6px"><span style="text-align:center;font-size:14px;font-weight:700;color:${si===csi?'var(--o)':'var(--a)'}">${si===csi?'▶':si<csi?'✓':''} ${si+1}</span><input type="number" inputmode="numeric" class="si" value="${s.sec}" onchange="sE[${sI}].sets[${si}].sec=this.value" placeholder="초"><button style="background:var(--pd);border:none;color:var(--p);border-radius:8px;padding:8px;cursor:pointer;font-size:13px;font-weight:700" onclick="goHold(${si})">▶</button>${ex.sets.length>1?`<button class="bi dg" onclick="sE[${sI}].sets.splice(${si},1);rSess()">✕</button>`:'<span></span>'}</div>`;
    });
  }else if(ex.type==='weight'){
    const uL=sU==='lb'?'무게(lb)':'무게(kg)';
    h+=`<div style="display:grid;grid-template-columns:36px 1fr 1fr 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--td);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--td)">${uL}</span><span style="font-size:11px;font-weight:700;color:var(--td)">횟수</span><span></span></div>`;
    ex.sets.forEach((s,si)=>{const dv=sU==='lb'&&s.lb?s.lb:s.kg;
      const cls=si<csi?'set-done':si===csi?'set-active':'';
      h+=`<div class="${cls}" style="display:grid;grid-template-columns:36px 1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:6px"><span style="text-align:center;font-size:14px;font-weight:700;color:${si===csi?'var(--o)':'var(--a)'}">${si===csi?'▶':si<csi?'✓':''} ${si+1}</span><input type="number" inputmode="decimal" class="si" value="${dv}" onchange="hWI(${si},this.value)" placeholder="0"><input type="number" inputmode="numeric" class="si" value="${s.reps}" onchange="sE[${sI}].sets[${si}].reps=this.value" placeholder="0">${ex.sets.length>1?`<button class="bi dg" onclick="sE[${sI}].sets.splice(${si},1);if(curSet[${sI}]>=${si}&&curSet[${sI}]>0)curSet[${sI}]--;rSess()">✕</button>`:'<span></span>'}</div>`;
      if(sU==='lb'&&s.lb)h+=`<div style="grid-column:2;font-size:11px;color:var(--td);margin-top:-4px;margin-bottom:4px;padding-left:4px">= ${s.kg}kg${ex.dumb==='one'?' (양쪽 '+Math.round(parseFloat(s.kg)*2*10)/10+'kg)':''}</div>`;
      else if(ex.dumb==='one'&&s.kg)h+=`<div style="grid-column:2;font-size:11px;color:var(--td);margin-top:-4px;margin-bottom:4px;padding-left:4px">양쪽 = ${Math.round(parseFloat(s.kg)*2*10)/10}kg</div>`;
    });
  }else{
    h+=`<div style="display:grid;grid-template-columns:36px 1fr 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--td);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--td)">횟수</span><span></span></div>`;
    ex.sets.forEach((s,si)=>{
      const cls=si<csi?'set-done':si===csi?'set-active':'';
      h+=`<div class="${cls}" style="display:grid;grid-template-columns:36px 1fr 32px;gap:8px;align-items:center;margin-bottom:6px"><span style="text-align:center;font-size:14px;font-weight:700;color:${si===csi?'var(--o)':'var(--a)'}">${si===csi?'▶':si<csi?'✓':''} ${si+1}</span><input type="number" inputmode="numeric" class="si" value="${s.reps}" onchange="sE[${sI}].sets[${si}].reps=this.value" placeholder="0">${ex.sets.length>1?`<button class="bi dg" onclick="sE[${sI}].sets.splice(${si},1);rSess()">✕</button>`:'<span></span>'}</div>`;
    });
  }
  h+=`</div>`;

  // Set done + add buttons
  h+=`<div style="display:flex;gap:8px;margin:16px 0 20px"><button class="bp" style="flex:2;font-size:14px;padding:12px" onclick="markSetDone()">세트 완료 ✓</button><button class="bs" style="flex:1;font-size:13px;padding:10px" onclick="addSS()">+ 세트</button></div>`;

  // Expected volume
  h+=expectedVol(ex);

  // Rest
  h+=`<div class="cd" style="display:flex;align-items:center;gap:12px;padding:14px;margin-top:6px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/></svg><div style="flex:1"><div style="font-size:13px;font-weight:600;margin-bottom:4px">쉬는 시간</div><div style="display:flex;gap:6px;align-items:center"><input type="number" inputmode="numeric" style="width:50px;text-align:center;padding:6px 8px;font-size:14px" value="${rM}" onchange="uRest(this.value,null)"><span style="font-size:13px;color:var(--td)">분</span><input type="number" inputmode="numeric" style="width:50px;text-align:center;padding:6px 8px;font-size:14px" value="${rSc}" onchange="uRest(null,this.value)"><span style="font-size:13px;color:var(--td)">초</span></div></div><button style="background:var(--ad);border:none;color:var(--a);border-radius:10px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit" onclick="startR()">시작</button></div>`;

  h+=`<div style="display:flex;gap:10px;margin-top:24px">`;
  if(sI>0)h+=`<button class="bs" style="flex:1" onclick="sI--;rSess();window.scrollTo(0,0)">이전</button>`;
  if(sI<sE.length-1)h+=`<button class="bp" style="flex:1" onclick="sI++;rSess();window.scrollTo(0,0)">다음 운동</button>`;
  else h+=`<button class="bp" style="flex:1;background:var(--o)" onclick="finWO()">운동 완료!</button>`;
  h+=`</div>`;
  document.getElementById('ssc').innerHTML=h;
}

function markSetDone(){
  const ex=sE[sI];const cs=curSet[sI]||0;
  if(cs<ex.sets.length-1){curSet[sI]=cs+1;rSess();startR();}
  else{curSet[sI]=ex.sets.length;rSess();} // all done
}

function hWI(si,v){const p=pW(v,sU);sE[sI].sets[si].kg=p.kg;sE[sI].sets[si].lb=p.lb;if(sU==='lb')rSess();}
function addSS(){const ex=sE[sI],last=ex.sets[ex.sets.length-1]||{};if(ex.type==='hold')ex.sets.push({sec:last.sec||''});else if(ex.type==='weight')ex.sets.push({kg:last.kg||'',reps:last.reps||'',lb:last.lb||''});else ex.sets.push({reps:last.reps||''});rSess();}
function uRest(m,s){const ex=sE[sI],cM=Math.floor(ex.restSec/60),cS=ex.restSec%60;ex.restSec=(m!==null?parseInt(m)||0:cM)*60+(s!==null?parseInt(s)||0:cS);}

// Rest timer with encouragement
function startR(){rT=sE[sI].restSec;if(rT<=0)return;rL=rT;document.getElementById('oR').style.display='flex';
  const cs=curSet[sI]||0;const total=sE[sI].sets.length;const left=total-cs;
  const msg=REST_MSG[Math.floor(Math.random()*REST_MSG.length)];
  document.getElementById('rMsg').textContent=`${cs}/${total} 세트 완료${left>0?' · 앞으로 '+left+'세트':' · 마지막 세트!'}\n${msg}`;
  uRD();rI=setInterval(()=>{rL--;uRD();if(rL<=0)stopR()},1000);
}
function uRD(){const m=Math.floor(rL/60),s=rL%60;document.getElementById('rd').textContent=m+':'+s.toString().padStart(2,'0');const c=2*Math.PI*90;document.getElementById('rc').setAttribute('stroke-dashoffset',c*(1-rL/rT));}
function stopR(){clearInterval(rI);rI=null;document.getElementById('oR').style.display='none';}

function goHold(si){const t=parseInt(sE[sI].sets[si].sec)||30;hL=t;hCb=si;document.getElementById('oH').style.display='flex';document.getElementById('hlb').textContent=sE[sI].name+' — 세트 '+(si+1);document.getElementById('hdd').textContent=hL;document.getElementById('hdd').style.color='var(--o)';hI=setInterval(()=>{hL--;document.getElementById('hdd').textContent=Math.max(hL,0);if(hL<=0){clearInterval(hI);hI=null;document.getElementById('hdd').style.color='var(--a)';document.getElementById('hdd').textContent='✓';}},1000);}
function stopH(ok){clearInterval(hI);hI=null;document.getElementById('oH').style.display='none';if(ok&&hCb!==null){const t=parseInt(sE[sI].sets[hCb].sec)||0;sE[sI].sets[hCb].sec=String(t-Math.max(hL,0));curSet[sI]=(curSet[sI]||0)+1;rSess();}hCb=null;}

async function finWO(){await autoSave();fDur=Math.round((Date.now()-sStart)/60000);const now=new Date();fTime=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');document.getElementById('mmi').textContent=fDur2(fDur)+' 동안 '+sE.length+'개 운동';document.getElementById('mmt').textContent='완료 시각: '+fTime;document.getElementById('mmtx').value='';sE=[];sI=0;curSet={};nav('mm');}

async function saveMemo(){const memo=document.getElementById('mmtx').value.trim();const dt=tod();
  // Find logs from this session, or fallback to today's latest
  let tl=L.filter(l=>l.sessId===sessId).sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(!tl.length)tl=L.filter(l=>l.date===dt).sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(tl.length){tl[0].memo=memo;tl[0].completedAt=fTime;tl[0].duration=fDur;await dP('logs',tl[0]);}rSum();nav('sm');}

// ═══ SUMMARY with charts ═══
function rSum(){
  // Get entries from this session, or fallback to today
  let entries=L.filter(l=>l.sessId===sessId);
  if(!entries.length)entries=L.filter(l=>l.date===tod());
  const old=L.filter(l=>!entries.find(e=>e.id===l.id));
  let tV=0,tS=0,tR=0;const items=[];
  entries.forEach(e=>{const prev=old.filter(l=>l.exerciseId===e.exerciseId).sort((a,b)=>(b.ts||0)-(a.ts||0))[0];
    const cv=logVol(e);
    if(e.type==='hold'){tS+=e.sets.length;if(prev){const pv=logVol(prev);const d=cv-pv;items.push({t:d>0?'up':d<0?'dn':'eq',x:`${e.exerciseName}: ${d>0?'+':''}${d}초${d>0?' ▲':d<0?' ▼':''}`});}else items.push({t:'nw',x:`${e.exerciseName}: 첫 기록! 🎉`});}
    else{const cr=e.sets.reduce((s,x)=>s+(parseInt(x.reps)||0),0);tV+=cv;tS+=e.sets.length;tR+=cr;
      if(prev){const pv=logVol(prev);if(e.type==='weight'){const d=cv-pv;items.push({t:d>0?'up':d<0?'dn':'eq',x:`${e.exerciseName}: 볼륨 ${d>0?'+':''}${Math.round(d)}kg${d>0?' ▲':d<0?' ▼':''}`});const mW=Math.max(...e.sets.map(s=>parseFloat(s.weight)||0)),pw=Math.max(...prev.sets.map(s=>parseFloat(s.weight)||0));if(mW>pw)items.push({t:'pr',x:`${e.exerciseName}: 최대 ${mW}kg 🏆`});}else{const pr2=prev.sets.reduce((s,x)=>s+(parseInt(x.reps)||0),0);const d=cr-pr2;items.push({t:d>0?'up':d<0?'dn':'eq',x:`${e.exerciseName}: ${d>0?'+':''}${d}회${d>0?' ▲':d<0?' ▼':''}`});}}
      else items.push({t:'nw',x:`${e.exerciseName}: 첫 기록! 🎉`});}
  });

  // Volume chart for today's exercises
  let volChart='';
  if(entries.filter(e=>e.type==='weight').length){
    const wEntries=entries.filter(e=>e.type==='weight');
    const maxV=Math.max(...wEntries.map(e=>logVol(e)),1);
    volChart=`<div class="cd" style="margin-top:16px;padding:16px"><div style="font-size:13px;font-weight:700;margin-bottom:14px">오늘 운동별 볼륨</div><div style="display:flex;gap:10px;overflow-x:auto">${wEntries.map(e=>{const v=logVol(e);const pct=Math.max(v/maxV*100,8);return`<div style="min-width:60px;flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:10px;color:var(--a);font-weight:600;margin-bottom:6px">${Math.round(v).toLocaleString()}kg</div><div style="width:100%;height:80px;display:flex;align-items:flex-end"><div style="width:100%;height:${pct}%;background:var(--a);border-radius:4px 4px 0 0;min-height:6px"></div></div><div style="font-size:10px;color:var(--td);margin-top:8px;text-align:center;word-break:keep-all;line-height:1.3">${esc(e.exerciseName)}</div></div>`}).join('')}</div></div>`;
  }

  const lastLog=entries[entries.length-1];
  document.getElementById('smc').innerHTML=`<div style="text-align:center;margin-bottom:24px"><div style="font-size:48px;margin-bottom:8px">🔥</div><h2 style="font-size:24px;font-weight:800">운동 완료!</h2><p style="color:var(--td);font-size:14px;margin-top:4px">${fDur}분 · ${entries.length}개 운동</p>${fTime?`<p style="color:var(--a);font-size:13px">완료: ${fTime}</p>`:''}</div>
  <div class="stat-row"><div class="stat-box"><div class="n">${tV?Math.round(tV).toLocaleString()+'kg':tS}</div><div class="l">${tV?'총 볼륨':'총 세트'}</div></div><div class="stat-box"><div class="n">${fDur2(fDur)}</div><div class="l">운동시간</div></div></div>
  <div class="cd" style="background:linear-gradient(135deg,#14141f,#1a1a30)"><div style="font-size:15px;font-weight:700;margin-bottom:12px">📊 인사이트</div>${items.map(i=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:14px"><span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${i.t==='up'||i.t==='pr'?'var(--a)':i.t==='dn'?'var(--w)':i.t==='nw'?'var(--bl)':'var(--td)'}"></span><span${i.t==='pr'?' style="color:var(--o)"':''}>${esc(i.x)}</span></div>`).join('')}</div>
  ${volChart}
  ${lastLog?.memo?`<div class="cd" style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--p);margin-bottom:6px">📝 메모</div><div style="font-size:14px;line-height:1.6">${esc(lastLog.memo)}</div></div>`:''}<button class="bp" style="margin-top:16px" onclick="nav('home')">홈으로</button>`;
}

// ═══ CALENDAR ═══
function calN(d){if(CV==='month'){cM+=d;if(cM>11){cM=0;cY++}if(cM<0){cM=11;cY--}}else{
  if(!cWeekRef)cWeekRef=new Date();
  cWeekRef=new Date(cWeekRef.getTime()+d*7*864e5);
}rCal();}
function rCal(){
  document.getElementById('cvw').className=CV==='week'?'on':'';document.getElementById('cvm').className=CV==='month'?'on':'';
  const wD=new Set(L.map(l=>l.date)),now=new Date(),ts=tod();
  const ws=new Date(now);ws.setDate(now.getDate()-now.getDay());ws.setHours(0,0,0,0);const ms=new Date(now.getFullYear(),now.getMonth(),1);
  let wc=0,mc=0;wD.forEach(d=>{const dt=new Date(d+'T00:00:00');if(dt>=ws)wc++;if(dt>=ms)mc++;});
  document.getElementById('cst').innerHTML=`<div class="stat-box"><div class="n">${wc}</div><div class="l">이번 주</div></div><div class="stat-box"><div class="n">${mc}</div><div class="l">이번 달</div></div>`;
  if(CV==='month'){
    document.getElementById('ctt').textContent=cY+'년 '+(cM+1)+'월';
    const f=new Date(cY,cM,1),sd=f.getDay(),dim=new Date(cY,cM+1,0).getDate(),pd=new Date(cY,cM,0).getDate();
    let h='<div class="cg">';['일','월','화','수','목','금','토'].forEach(d=>h+=`<div class="ch2">${d}</div>`);
    for(let i=sd-1;i>=0;i--)h+=`<div class="cd2">${pd-i}</div>`;
    for(let d=1;d<=dim;d++){const ds=`${cY}-${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;h+=`<div class="cd2 cm${ds===ts?' tod':''}${wD.has(ds)?' hw':''}" onclick="shCD('${ds}')">${d}</div>`;}
    const tc=sd+dim,rm=tc%7?7-tc%7:0;for(let i=1;i<=rm;i++)h+=`<div class="cd2">${i}</div>`;h+='</div>';document.getElementById('cbd').innerHTML=h;
  }else{
    // Week view - use cWeekRef
    if(!cWeekRef)cWeekRef=new Date();
    const weekStart=new Date(cWeekRef);weekStart.setDate(cWeekRef.getDate()-cWeekRef.getDay());weekStart.setHours(0,0,0,0);
    const we=new Date(weekStart.getTime()+6*864e5);
    document.getElementById('ctt').textContent=(weekStart.getMonth()+1)+'/'+weekStart.getDate()+' ~ '+(we.getMonth()+1)+'/'+we.getDate();
    let h='<div class="cg">';['일','월','화','수','목','금','토'].forEach(d=>h+=`<div class="ch2">${d}</div>`);
    for(let i=0;i<7;i++){
      const d=new Date(weekStart.getTime()+i*864e5);
      const y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate();
      const ds=y+'-'+String(m).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
      h+=`<div class="cd2 cm${ds===ts?' tod':''}${wD.has(ds)?' hw':''}" style="padding:16px 0;font-size:16px" onclick="shCD('${ds}')">${dd}</div>`;
    }
    h+='</div>';document.getElementById('cbd').innerHTML=h;
  }
  document.getElementById('cdt').innerHTML='';
}
function shCD(ds){const dl=L.filter(l=>l.date===ds);if(!dl.length){document.getElementById('cdt').innerHTML=`<div class="cd" style="text-align:center"><span style="color:var(--td);font-size:13px">${ds} — 기록 없음</span></div>`;return;}
  document.getElementById('cdt').innerHTML=`<div class="cd" style="padding:14px"><div style="font-size:14px;font-weight:700;color:var(--a);margin-bottom:10px">${ds}${dl[0].completedAt?' · '+dl[0].completedAt:''}${dl[0].duration?' · '+fDur2(dl[0].duration):''}</div>${dl.map(l=>`<div style="margin-bottom:10px"><div style="font-weight:600;font-size:14px">${esc(l.exerciseName)}${l.dumb==='one'?' 🔸한쪽':''}</div><div style="font-size:13px;color:var(--td);margin-top:2px">${fSS(l)}</div></div>`).join('')}${dl[0].memo?`<div style="font-size:12px;color:var(--p);margin-top:8px;border-top:1px solid var(--bd);padding-top:8px">📝 ${esc(dl[0].memo)}</div>`:''}</div>`;
}

function fDur2(m){if(!m)return'';if(m<60)return m+'분';return Math.floor(m/60)+'시간 '+(m%60)+'분';}

// ═══ HISTORY with stats ═══
function rHist(){
  const totalDays=new Set(L.map(l=>l.date)).size;
  const totalSets=L.reduce((s,l)=>s+l.sets.length,0);
  const totalVol=Math.round(L.filter(l=>l.type==='weight').reduce((s,l)=>s+logVol(l),0));
  const streak=calcStreak();

  // Period comparisons
  const now=new Date(),ts=tod();
  function periodVol(startDate,endDate){return Math.round(L.filter(l=>{const d=new Date(l.date+'T00:00:00');return d>=startDate&&d<endDate&&l.type==='weight'}).reduce((s,l)=>s+logVol(l),0));}
  function periodDays(startDate,endDate){return new Set(L.filter(l=>{const d=new Date(l.date+'T00:00:00');return d>=startDate&&d<endDate}).map(l=>l.date)).size;}

  // This week vs last week
  const thisWkS=new Date(now);thisWkS.setDate(now.getDate()-now.getDay());thisWkS.setHours(0,0,0,0);
  const lastWkS=new Date(thisWkS.getTime()-7*864e5);
  const thisWkV=periodVol(thisWkS,new Date(thisWkS.getTime()+7*864e5));
  const lastWkV=periodVol(lastWkS,thisWkS);
  const thisWkD=periodDays(thisWkS,new Date(thisWkS.getTime()+7*864e5));
  const lastWkD=periodDays(lastWkS,thisWkS);

  // This month vs last month
  const thisMoS=new Date(now.getFullYear(),now.getMonth(),1);
  const lastMoS=new Date(now.getFullYear(),now.getMonth()-1,1);
  const thisMoV=periodVol(thisMoS,new Date(now.getFullYear(),now.getMonth()+1,1));
  const lastMoV=periodVol(lastMoS,thisMoS);
  const thisMoD=periodDays(thisMoS,new Date(now.getFullYear(),now.getMonth()+1,1));
  const lastMoD=periodDays(lastMoS,thisMoS);

  function cmpArrow(cur,prev){if(!prev)return'<span style="color:var(--td)">—</span>';const d=cur-prev;const pct=Math.round(d/prev*100);if(d>0)return`<span style="color:var(--a)">▲ ${pct}%</span>`;if(d<0)return`<span style="color:var(--w)">▼ ${Math.abs(pct)}%</span>`;return`<span style="color:var(--td)">→ 동일</span>`;}

  document.getElementById('hstat').innerHTML=`
    <div class="stat-row"><div class="stat-box"><div class="n">${totalDays}</div><div class="l">총 운동일</div></div><div class="stat-box"><div class="n">${streak}</div><div class="l">연속 주간</div></div></div>
    <div class="stat-row"><div class="stat-box"><div class="n">${totalSets}</div><div class="l">총 세트</div></div><div class="stat-box"><div class="n">${totalVol?totalVol.toLocaleString()+'kg':'-'}</div><div class="l">누적 볼륨</div></div></div>
    <div class="cd" style="padding:14px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px">📈 성장 비교</div>
      <table style="width:100%;font-size:13px;border-collapse:collapse">
        <tr style="color:var(--td)"><td></td><td style="text-align:right;padding:4px">이전</td><td style="text-align:right;padding:4px">현재</td><td style="text-align:right;padding:4px">변화</td></tr>
        <tr><td style="padding:6px 4px;border-top:1px solid var(--bd)">주간 볼륨</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${lastWkV?lastWkV.toLocaleString()+'kg':'-'}</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd);color:var(--a);font-weight:600">${thisWkV?thisWkV.toLocaleString()+'kg':'-'}</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${cmpArrow(thisWkV,lastWkV)}</td></tr>
        <tr><td style="padding:6px 4px;border-top:1px solid var(--bd)">주간 운동일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${lastWkD}일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd);color:var(--a);font-weight:600">${thisWkD}일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${cmpArrow(thisWkD,lastWkD)}</td></tr>
        <tr><td style="padding:6px 4px;border-top:1px solid var(--bd)">월간 볼륨</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${lastMoV?lastMoV.toLocaleString()+'kg':'-'}</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd);color:var(--a);font-weight:600">${thisMoV?thisMoV.toLocaleString()+'kg':'-'}</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${cmpArrow(thisMoV,lastMoV)}</td></tr>
        <tr><td style="padding:6px 4px;border-top:1px solid var(--bd)">월간 운동일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${lastMoD}일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd);color:var(--a);font-weight:600">${thisMoD}일</td><td style="text-align:right;padding:6px 4px;border-top:1px solid var(--bd)">${cmpArrow(thisMoD,lastMoD)}</td></tr>
      </table>
    </div>`;

  // Weekly volume chart (last 8 weeks)
  const weeks=[];for(let i=7;i>=0;i--){const d=new Date();d.setDate(d.getDate()-d.getDay()-i*7);weeks.push(d);}
  const wVols=weeks.map(ws=>{const we2=new Date(ws.getTime()+7*864e5);return L.filter(l=>{const ld=new Date(l.date+'T00:00:00');return ld>=ws&&ld<we2&&l.type==='weight'}).reduce((s,l)=>s+logVol(l),0);});
  const wMax=Math.max(...wVols,1);
  if(totalVol>0){
    document.getElementById('hchart').innerHTML=`<div class="cd"><div style="font-size:13px;font-weight:700;margin-bottom:12px">주간 볼륨 추이 (8주)</div><div style="display:flex;gap:6px">${wVols.map((v,i)=>{const pct=Math.max(v/wMax*100,5);const wk=new Date(weeks[i]);const isLast=i===wVols.length-1;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:9px;color:${isLast?'var(--o)':'var(--a)'};font-weight:600;margin-bottom:4px;min-height:14px">${v?Math.round(v).toLocaleString():''}</div><div style="width:100%;height:80px;display:flex;align-items:flex-end"><div style="width:100%;height:${pct}%;background:${isLast?'var(--o)':'var(--a)'};border-radius:3px 3px 0 0;min-height:4px"></div></div><div style="font-size:9px;color:var(--td);margin-top:4px">${wk.getMonth()+1}/${wk.getDate()}</div></div>`}).join('')}</div></div>`;
  }else document.getElementById('hchart').innerHTML='';

  // Log list grouped by session with h:m duration
  const el=document.getElementById('hls');if(!L.length){el.innerHTML='<p style="color:var(--td);text-align:center;padding:20px">기록 없음</p>';return;}
  const sessions=groupSessions();
  el.innerHTML=sessions.map(g=>`<div style="margin-bottom:20px"><div style="font-size:14px;font-weight:700;color:var(--a);margin-bottom:8px">${g.date}${g.startedAt?' · '+g.startedAt:''}${g.completedAt?' → '+g.completedAt:''}${g.duration?' · '+fDur2(g.duration):''}</div>${g.logs.map(l=>`<div class="cd" style="padding:12px;margin-bottom:8px"><div class="fb"><div style="font-weight:600;font-size:14px">${esc(l.exerciseName)}${l.dumb==='one'?' <span class="bg bo">한쪽</span>':''}</div><div style="display:flex;gap:4px"><button class="bi" onclick="edLog('${l.id}')">✏️</button><button class="bi dg" onclick="dLog('${l.id}')">🗑</button></div></div><div style="font-size:13px;color:var(--td);margin-top:6px">${fFull(l)}</div></div>`).join('')}${g.memo?`<div style="font-size:12px;color:var(--p);margin:0 4px 8px;padding:8px 12px;background:var(--pd);border-radius:10px">📝 ${esc(g.memo)}</div>`:''}</div>`).join('');
}

function calcStreak(){
  const dates=[...new Set(L.map(l=>l.date))].sort();if(!dates.length)return 0;
  let streak=0;const now=new Date();
  for(let w=0;w<52;w++){
    const ws=new Date(now);ws.setDate(now.getDate()-now.getDay()-w*7);
    const we=new Date(ws.getTime()+7*864e5);
    const has=dates.some(d=>{const dt=new Date(d+'T00:00:00');return dt>=ws&&dt<we;});
    if(has)streak++;else break;
  }
  return streak;
}

function fFull(l){if(l.type==='hold')return l.sets.map((s,i)=>`${i?' → ':''}${s.sec||s.holdSec||'?'}초`).join('');if(l.type==='weight')return l.sets.map((s,i)=>`${i?' → ':''}${dW(s.weight,s.lb)}×${s.reps}회`).join('');return l.sets.map((s,i)=>`${i?' → ':''}${s.reps}회`).join('');}
async function dLog(id){if(!confirm('삭제?'))return;await dD('logs',id);L=L.filter(l=>l.id!==id);rHist();}
function edLog(id){eLId=id;const log=L.find(l=>l.id===id);if(!log)return;
  let h=`<div class="cd"><div style="font-weight:700;font-size:16px;margin-bottom:6px">${esc(log.exerciseName)}${log.dumb==='one'?' 🔸한쪽':''}</div><div style="font-size:13px;color:var(--td);margin-bottom:12px">${log.date}</div>`;
  if(log.type==='hold')log.sets.forEach((s,i)=>{h+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="font-weight:700;color:var(--a);width:30px;text-align:center">${i+1}</span><input type="number" class="si" style="flex:1" value="${s.sec||s.holdSec||''}" onchange="eLSet(${i},'sec',this.value)"><span style="color:var(--td);font-size:13px">초</span></div>`;});
  else if(log.type==='weight')log.sets.forEach((s,i)=>{h+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="font-weight:700;color:var(--a);width:30px;text-align:center">${i+1}</span><input type="number" class="si" style="flex:1" value="${s.weight}" onchange="eLSet(${i},'weight',this.value)" placeholder="kg"><input type="number" class="si" style="flex:1" value="${s.reps}" onchange="eLSet(${i},'reps',this.value)" placeholder="횟수"></div>`;});
  else log.sets.forEach((s,i)=>{h+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="font-weight:700;color:var(--a);width:30px;text-align:center">${i+1}</span><input type="number" class="si" style="flex:1" value="${s.reps}" onchange="eLSet(${i},'reps',this.value)"></div>`;});
  h+=`<div style="margin-top:12px"><label class="lb">메모</label><textarea id="elm" style="min-height:60px">${esc(log.memo||'')}</textarea></div></div><button class="bp" style="margin-top:12px" onclick="saveEL()">수정 완료</button>`;
  document.getElementById('elc').innerHTML=h;nav('el');
}
function eLSet(si,f,v){const log=L.find(l=>l.id===eLId);if(log)log.sets[si][f]=v;}
async function saveEL(){const log=L.find(l=>l.id===eLId);if(!log)return;log.memo=document.getElementById('elm').value.trim();await dP('logs',log);eLId=null;nav('hs');}

// ═══ BACKUP/RESTORE ═══
function doBackup(){const data={version:1,date:new Date().toISOString(),exercises:E,programs:P,logs:L};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='workout_backup_'+tod().replace(/-/g,'')+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);const m=document.getElementById('bmsg');m.style.display='block';m.style.color='var(--a)';m.textContent='✓ 백업 완료!';setTimeout(()=>m.style.display='none',5000);}
async function doRestore(input){const file=input.files[0];if(!file)return;const m=document.getElementById('bmsg');try{const text=await file.text();const data=JSON.parse(text);if(!data.exercises||!data.logs)throw new Error('올바른 백업 파일이 아닙니다.');if(!confirm('복원할까요? 기존 데이터와 합쳐집니다.'))return;for(const ex of data.exercises)await dP('exercises',ex);for(const p of(data.programs||[])){if(p.days)p.days=p.days.map(d=>({l:d.l||d.label||'',e:d.e||d.eids||d.exerciseIds||[]}));await dP('programs',p);}for(const l of data.logs){if(!l.ts&&l.timestamp)l.ts=l.timestamp;await dP('logs',l);}E=await dA('exercises');P=(await dA('programs')).map(normP);L=(await dA('logs')).map(normL);m.style.display='block';m.style.color='var(--a)';m.textContent='✓ 복원 완료!';rHist();setTimeout(()=>m.style.display='none',5000);}catch(e){m.style.display='block';m.style.color='var(--w)';m.textContent='❌ '+e.message;setTimeout(()=>m.style.display='none',5000);}input.value='';}

init();
</script>
