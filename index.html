<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WORKOUT">
<meta name="theme-color" content="#0a0a0f">
<title>WORKOUT</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--card:#14141f;--accent:#00e5a0;--accent-dim:rgba(0,229,160,.15);--accent-glow:rgba(0,229,160,.3);--warn:#ff6b6b;--warn-dim:rgba(255,107,107,.15);--text:#e8e8f0;--text-dim:#6b6b80;--border:#22223a;--orange:#ffaa40;--orange-dim:rgba(255,170,64,.15);--blue:#4da6ff;--blue-dim:rgba(77,166,255,.15);--purple:#b18cff;--purple-dim:rgba(177,140,255,.15)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard Variable','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased;overscroll-behavior:none;padding-bottom:90px;padding-top:env(safe-area-inset-top,0)}
.page{display:none;padding:20px 16px;animation:fadeIn .2s ease}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid var(--border)}
.btn-p{background:var(--accent);color:#0a0a0f;border:none;border-radius:12px;padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%;letter-spacing:.02em;font-family:inherit}.btn-p:active{transform:scale(.97)}
.btn-s{background:transparent;color:var(--accent);border:1.5px solid var(--accent);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
.btn-i{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;color:var(--text-dim)}.btn-i.danger{color:var(--warn)}
input,select,textarea{background:#0d0d18;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;width:100%;outline:none;font-family:inherit;transition:border-color .2s}input:focus,textarea:focus{border-color:var(--accent)}input::placeholder,textarea::placeholder{color:var(--text-dim)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.chip{display:inline-flex;align-items:center;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text-dim);transition:all .15s;white-space:nowrap;font-family:inherit}
.chip.on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.chip.on-o{border-color:var(--orange);background:var(--orange-dim);color:var(--orange)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.03em}
.b-a{background:var(--accent-dim);color:var(--accent)}.b-o{background:var(--orange-dim);color:var(--orange)}.b-b{background:var(--blue-dim);color:var(--blue)}.b-p{background:var(--purple-dim);color:var(--purple)}
.label{font-size:13px;font-weight:600;color:var(--text-dim);display:block;margin-bottom:6px}
.fb{display:flex;justify-content:space-between;align-items:center}
.fw{display:flex;gap:6px;flex-wrap:wrap}
.toggle{display:flex;background:#0d0d18;border-radius:10px;border:1.5px solid var(--border);overflow:hidden}
.toggle button{flex:1;padding:8px 12px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-family:inherit;transition:all .15s}
.toggle button.on{background:var(--accent);color:#0a0a0f}
.tab-bar{position:fixed;bottom:12px;left:12px;right:12px;max-width:456px;margin:0 auto;background:rgba(20,20,31,.92);border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:50;padding:4px}
.tab-bar-inner{display:flex}
.tab-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0;cursor:pointer;color:var(--text-dim);transition:color .15s;font-family:inherit;border-radius:16px}.tab-btn.active{color:var(--accent);background:rgba(0,229,160,.08)}.tab-btn span{font-size:10px;font-weight:600}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.big-time{font-size:56px;font-weight:800;font-variant-numeric:tabular-nums}
.yt-thumb{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:16/9;background:#000}.yt-thumb img{width:100%;height:100%;object-fit:cover}
.yt-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4)}.yt-play svg{width:48px;height:48px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-h{font-size:11px;font-weight:700;color:var(--text-dim);padding:6px 0}
.cal-d{font-size:13px;padding:8px 0;border-radius:8px;position:relative;color:var(--text-dim);cursor:pointer}
.cal-d.cm{color:var(--text)}.cal-d.tod{font-weight:800;color:var(--accent)}
.cal-d.hw::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--accent)}
.moti{background:linear-gradient(135deg,#1a1a30,#14142a);border:1px solid rgba(177,140,255,.2);border-radius:16px;padding:20px;margin-bottom:20px;text-align:center}
.moti .q{font-size:16px;font-weight:600;line-height:1.6;margin-bottom:8px}.moti .a{font-size:12px;color:var(--purple)}
.si{padding:10px 8px;font-size:15px;font-weight:600;text-align:center}
</style>
</head>
<body>

<div id="p-home" class="page active">
  <div style="margin-bottom:20px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a6 6 0 1 0 12 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-4 2z"/></svg><h1 style="font-size:26px;font-weight:800;letter-spacing:-.02em">WORKOUT</h1></div><p id="hdate" style="color:var(--text-dim);font-size:13px;margin-left:32px"></p></div>
  <div id="hmoti"></div>
  <div class="card" style="background:linear-gradient(135deg,var(--card),#1a1a30);border:1px solid var(--accent-glow)">
    <div style="font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px">▶ 빠른 시작</div>
    <p style="color:var(--text-dim);font-size:13px;margin:0 0 14px">운동을 직접 골라서 바로 시작</p>
    <button class="btn-p" onclick="nav('qs')">운동 선택하기</button>
  </div>
  <div style="margin-top:20px"><div class="fb" style="margin-bottom:12px"><h2 style="font-size:17px;font-weight:700">내 프로그램</h2><button onclick="openPF()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit">+ 추가</button></div><div id="hprog"></div></div>
  <div style="margin-top:20px"><h2 style="font-size:17px;font-weight:700;margin-bottom:12px">최근 기록</h2><div id="hrec"></div></div>
</div>

<div id="p-qs" class="page"><div style="display:flex;align-items:center;gap:8px;margin-bottom:20px"><button class="btn-i" onclick="nav('home')">◀</button><h2 style="font-size:20px;font-weight:800">운동 선택</h2></div><div id="qlist"></div><div id="qfloat" style="display:none;position:fixed;bottom:90px;left:16px;right:16px;max-width:448px;margin:0 auto;z-index:40"><button class="btn-p" style="box-shadow:0 0 30px var(--accent-glow)" onclick="startFQ()"><span id="qcnt"></span>개 운동 시작</button></div></div>

<div id="p-ex" class="page"><div class="fb" style="margin-bottom:20px"><h2 style="font-size:20px;font-weight:800">운동 목록</h2><button onclick="openEF()" style="background:var(--accent-dim);border:none;color:var(--accent);cursor:pointer;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;font-family:inherit">+ 추가</button></div><div id="exlist"></div></div>

<div id="p-exf" class="page"><div style="display:flex;align-items:center;gap:8px;margin-bottom:24px"><button class="btn-i" onclick="nav('ex')">◀</button><h2 id="eft">운동 추가</h2></div><div style="margin-bottom:16px"><label class="label">운동 이름</label><input id="efn" placeholder="예: 벤치프레스"></div><div style="margin-bottom:16px"><label class="label" style="margin-bottom:8px">유형</label><div class="fw" id="eftypes"></div></div><div style="margin-bottom:16px"><label class="label">카테고리</label><input id="efc" placeholder="예: 가슴, 등, 하체"><div id="efcc" class="fw" style="margin-top:8px"></div></div><div style="margin-bottom:24px"><label class="label">참고 영상 (YouTube)</label><div id="efv"></div><button class="btn-s" style="font-size:13px;padding:10px 16px;margin-top:8px" onclick="VI.push('');rEF()">+ 영상 추가</button></div><button class="btn-p" onclick="saveE()" id="efb">추가하기</button></div>

<div id="p-pf" class="page"><div style="display:flex;align-items:center;gap:8px;margin-bottom:24px"><button class="btn-i" onclick="nav('home')">◀</button><h2 id="pft">프로그램 추가</h2></div><div style="margin-bottom:16px"><label class="label">프로그램 이름</label><input id="pfn" placeholder="예: 주 3일 분할"></div><div id="pfd"></div><button class="btn-s" onclick="PD.push({l:'',e:[]});rPD()" style="margin-bottom:16px">+ Day 추가</button><button class="btn-p" onclick="saveP()" id="pfb">저장</button></div>

<div id="p-sess" class="page"><div id="sessc"></div></div>

<div id="p-memo" class="page"><div style="text-align:center;margin-bottom:24px"><div style="font-size:48px;margin-bottom:8px">🔥</div><h2 style="font-size:24px;font-weight:800">운동 완료!</h2><p id="mi" style="color:var(--text-dim);font-size:14px;margin-top:4px"></p><p id="mt" style="color:var(--accent);font-size:13px;margin-top:4px"></p></div><div style="margin-bottom:16px"><label class="label">오늘의 메모 / 피드백</label><textarea id="mtxt" placeholder="컨디션, 느낀점, 다음에 개선할 점..."></textarea></div><button class="btn-p" onclick="saveMemo()">저장하고 인사이트 보기</button></div>

<div id="p-sum" class="page"><div id="sumc"></div></div>

<div id="p-cal" class="page"><div class="fb" style="margin-bottom:16px"><h2 style="font-size:20px;font-weight:800">캘린더</h2><div class="toggle" style="width:100px"><button id="cvw" onclick="CV='week';rCal()">주</button><button id="cvm" class="on" onclick="CV='month';rCal()">월</button></div></div><div id="cst" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px"></div><div class="card" style="padding:14px"><div class="fb" style="margin-bottom:12px"><button class="btn-i" onclick="calN(-1)">◀</button><span id="ctt" style="font-size:15px;font-weight:700"></span><button class="btn-i" onclick="calN(1)">▶</button></div><div id="cbd"></div></div><div id="cdt" style="margin-top:12px"></div></div>

<div id="p-hist" class="page"><h2 style="font-size:20px;font-weight:800;margin-bottom:16px">운동 기록</h2><div id="hlist"></div></div>

<div id="p-elog" class="page"><div style="display:flex;align-items:center;gap:8px;margin-bottom:24px"><button class="btn-i" onclick="nav('hist')">◀</button><h2>기록 수정</h2></div><div id="elogc"></div></div>

<!-- Overlays -->
<div id="orest" class="overlay" style="display:none"><div style="position:relative;width:180px;height:180px;margin-bottom:24px"><svg width="180" height="180" style="transform:rotate(-90deg)"><circle cx="90" cy="90" r="54" fill="none" stroke="var(--border)" stroke-width="8"/><circle id="rc" cx="90" cy="90" r="54" fill="none" stroke="var(--accent)" stroke-width="8" stroke-dasharray="339.29" stroke-dashoffset="0" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/></svg><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><div id="rd" class="big-time" style="color:var(--accent);font-size:48px">0:00</div><div style="font-size:13px;color:var(--text-dim);margin-top:4px">쉬는 시간</div></div></div><button class="btn-s" style="width:auto;padding:10px 32px" onclick="stopR()">건너뛰기</button></div>

<div id="ohold" class="overlay" style="display:none"><div id="hlbl" style="font-size:14px;color:var(--text-dim);margin-bottom:8px"></div><div id="hd" class="big-time" style="color:var(--orange)">0</div><div style="font-size:14px;color:var(--text-dim);margin-top:4px;margin-bottom:24px">초</div><div style="display:flex;gap:12px"><button class="btn-s" style="width:auto;padding:10px 24px" onclick="stopH(false)">취소</button><button class="btn-p" style="width:auto;padding:10px 24px" onclick="stopH(true)">완료</button></div></div>

<div id="ovid" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;padding:20px"><div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn-i" onclick="clVid()" style="color:var(--text);font-size:24px;padding:8px">✕</button></div><div id="vide" style="border-radius:12px;overflow:hidden;aspect-ratio:16/9"></div></div>

<div class="tab-bar" id="tbar"><div class="tab-bar-inner">
  <button class="tab-btn active" data-t="home" onclick="nav('home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>홈</span></button>
  <button class="tab-btn" data-t="ex" onclick="nav('ex')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5h11M6.5 17.5h11"/></svg><span>운동</span></button>
  <button class="tab-btn" data-t="cal" onclick="nav('cal')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>캘린더</span></button>
  <button class="tab-btn" data-t="hist" onclick="nav('hist')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>기록</span></button>
</div></div>

<script>
const DB='WO4',DBV=1;
function odb(){return new Promise((r,j)=>{const q=indexedDB.open(DB,DBV);q.onupgradeneeded=e=>{const d=e.target.result;['exercises','programs','settings'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='settings'?'key':'id'})});if(!d.objectStoreNames.contains('logs')){const s=d.createObjectStore('logs',{keyPath:'id'});s.createIndex('date','date')}};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dA(s){const d=await odb();return new Promise((r,j)=>{const t=d.transaction(s);const q=t.objectStore(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dP(s,o){const d=await odb();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(o);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}
async function dD(s,k){const d=await odb();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}

let E=[],P=[],L=[];
let qS=[],edE=null,edP=null,eT='weight',PD=[{l:'',e:[]}],VI=[];
let sE=[],sI=0,sStart=0,sU='kg';
let rI=null,rL=0,rT=0;
let hI=null,hL=0,hCb=null;
let CV='month',cY,cM;
let fE=[],fDur=0,fTime='';
let eLId=null;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const tod=()=>new Date().toISOString().slice(0,10);
const fD=d=>{const t=new Date(d+'T00:00:00');return(t.getMonth()+1)+'/'+t.getDate()};
const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):'';
const L2K=0.453592;
function pW(v,u){const s=String(v).trim();if(u==='lb'){const n=parseFloat(s);if(isNaN(n))return{kg:'',lb:''};return{kg:String(Math.round(n*L2K*10)/10),lb:String(Math.round(n*10)/10)}}return{kg:s,lb:''}}
function dW(kg,lb){if(lb)return kg+'kg('+lb+'lb)';return kg?kg+'kg':'';}
function yid(u){if(!u)return null;const m=u.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&?\s]+)/);return m?m[1]:null}
function opVid(u){const id=yid(u);if(!id)return;document.getElementById('vide').innerHTML='<iframe width="100%" style="aspect-ratio:16/9;border:none" src="https://www.youtube.com/embed/'+id+'?autoplay=1&playsinline=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>';document.getElementById('ovid').style.display='block';}
function clVid(){document.getElementById('vide').innerHTML='';document.getElementById('ovid').style.display='none';}

const QT=[{q:"고통은 일시적이다. 포기는 영원하다."},{q:"어제의 나보다 1%만 더 강해지면 된다."},{q:"지금 흘리는 땀이 내일의 자신감이 된다."},{q:"꾸준함이 몸을 바꾼다."},{q:"운동을 후회한 사람은 없다."},{q:"변명을 들어올리지 말고, 바벨을 들어올려라."},{q:"포기하고 싶을 때가 성장의 시작이다."},{q:"한 번 더. 항상 한 번 더."},{q:"운동이 강한 사람을 만든다."},{q:"근육은 배신하지 않는다."},{q:"한계는 머릿속에만 존재한다."},{q:"흔들리지 마라. 흔들리는 건 바벨이면 충분하다."},{q:"결과는 반드시 온다."},{q:"딱 한 세트만 더. 그게 차이를 만든다."},{q:"오늘의 고통이 내일의 파워가 된다."},{q:"오늘도 해낸 나, 대단하다."},{q:"쉬운 길을 택하면 쉬운 몸이 된다."},{q:"운동은 나를 위한 가장 확실한 투자다."},{q:"네가 쉴 때 누군가는 달리고 있다."},{q:"내일의 나는 오늘의 내가 만든다."}];
function tQ(){const d=new Date(),n=Math.floor((d-new Date(d.getFullYear(),0,0))/864e5);return QT[n%QT.length]}
function gLL(eid){return L.filter(l=>l.exerciseId===eid).sort((a,b)=>(b.ts||0)-(a.ts||0))[0]||null}

// Auto save
async function autoSave(){
  if(!sE.length)return;
  const dt=tod(),now=Date.now();
  for(const ex of sE){
    let valid;
    if(ex.type==='hold')valid=ex.sets.filter(s=>s.sec&&s.sec!=='');
    else valid=ex.sets.filter(s=>s.reps&&s.reps!=='');
    if(!valid.length)continue;
    const sets=valid.map(s=>{
      if(ex.type==='weight'){
        const raw=parseFloat(s.kg)||0;
        const actual=ex.dumb==='one'?Math.round(raw*2*10)/10:raw;
        return{weight:String(actual),origW:s.kg,lb:s.lb||'',reps:s.reps,dumb:ex.dumb};
      }
      return{...s,dumb:ex.dumb};
    });
    const entry={id:ex._lid||uid(),exerciseId:ex.id,exerciseName:ex.name,type:ex.type,date:dt,sets,restSec:ex.restSec,ts:now,dumb:ex.dumb};
    if(!ex._lid)ex._lid=entry.id;
    await dP('logs',entry);
    const idx=L.findIndex(l=>l.id===entry.id);if(idx>=0)L[idx]=entry;else L.push(entry);
  }
}
setInterval(autoSave,30000);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden'&&sE.length)autoSave()});

async function init(){
  try{E=await dA('exercises')||[];P=await dA('programs')||[];L=await dA('logs')||[];}catch(e){console.error(e)}
  const n=new Date();cY=n.getFullYear();cM=n.getMonth();nav('home');
}

function fSS(l){
  if(l.type==='hold')return'('+l.sets.map(s=>(s.sec||s.holdSec||'?')+'초').join(', ')+')';
  if(l.type==='weight')return'('+l.sets.map(s=>dW(s.weight,s.lb)+'×'+s.reps).join(', ')+')';
  return'('+l.sets.map(s=>s.reps+'회').join(', ')+')';
}

// ═══ SESSION ═══
function startWO(eids){
  sU='kg';
  sE=eids.map(id=>{const e=E.find(x=>x.id===id);if(!e)return null;const last=gLL(id);
    let sets;
    if(e.type==='hold')sets=last?last.sets.map(s=>({sec:s.sec||s.holdSec||''})):[{sec:''}];
    else if(e.type==='weight')sets=last?last.sets.map(s=>({kg:s.origW||s.weight||'',reps:s.reps||'',lb:s.lb||''})):[{kg:'',reps:'',lb:''}];
    else sets=last?last.sets.map(s=>({reps:s.reps||''})):[{reps:''}];
    return{...e,sets,restSec:last?(last.restSec||60):60,dumb:last?(last.dumb||'both'):'both',_lid:null};
  }).filter(Boolean);
  if(!sE.length)return;sI=0;sStart=Date.now();nav('sess');rSess();
}

function rSess(){
  const ex=sE[sI];if(!ex)return;const last=gLL(ex.id);
  const rM=Math.floor(ex.restSec/60),rSec=ex.restSec%60;
  const vs=(ex.videos||[]).filter(v=>yid(v));
  let h='';
  // Progress
  h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><button class="btn-i" onclick="autoSave().then(()=>nav('home'))">◀</button><div style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;background:var(--accent);width:${((sI+1)/sE.length)*100}%;transition:width .3s"></div></div><span style="font-size:12px;color:var(--text-dim);font-weight:600">${sI+1}/${sE.length}</span></div>`;
  h+=`<h2 style="font-size:22px;font-weight:800;margin:16px 0 4px">${esc(ex.name)}</h2>`;
  const tl=ex.type==='weight'?'웨이트':ex.type==='hold'?'버티기':'맨몸',tb=ex.type==='weight'?'b-a':ex.type==='hold'?'b-p':'b-o';
  h+=`<div class="fw" style="margin-bottom:12px"><span class="badge ${tb}">${tl}</span></div>`;

  // Toggles for weight
  if(ex.type==='weight'){
    h+=`<div style="display:flex;gap:8px;margin-bottom:14px"><div class="toggle" style="flex:1"><button ${ex.dumb==='both'?'class="on"':''} onclick="sE[${sI}].dumb='both';rSess()">양쪽</button><button ${ex.dumb==='one'?'class="on"':''} onclick="sE[${sI}].dumb='one';rSess()">한쪽</button></div><div class="toggle" style="flex:1"><button ${sU==='kg'?'class="on"':''} onclick="sU='kg';rSess()">kg</button><button ${sU==='lb'?'class="on"':''} onclick="sU='lb';rSess()">lb</button></div></div>`;
    if(ex.dumb==='one')h+=`<div style="font-size:12px;color:var(--orange);margin-bottom:10px">🔸 한쪽 무게 입력 → 기록은 양쪽(×2) 자동 계산</div>`;
  }

  // Videos
  if(vs.length)h+=`<div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:14px">${vs.map(v=>`<div class="yt-thumb" style="width:130px;flex-shrink:0" onclick="opVid('${esc(v)}')"><img src="https://img.youtube.com/vi/${yid(v)}/mqdefault.jpg" loading="lazy"><div class="yt-play"><svg viewBox="0 0 68 48"><path d="M66.52 7.74c-.78-2.93-2.49-5.41-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55c-2.93.78-4.64 3.26-5.42 6.19C.06 13.05 0 24 0 24s.06 10.95 1.48 16.26c.78 2.93 2.49 5.41 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55c2.93-.78 4.64-3.26 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="red"/><path d="M45 24L27 14v20" fill="white"/></svg></div></div>`).join('')}</div>`;

  // Previous
  if(last){h+=`<div class="card" style="background:var(--blue-dim);border:1px solid rgba(77,166,255,.2);padding:12px;margin-bottom:14px;border-radius:12px"><div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:4px">이전 기록 (${fD(last.date)})${last.dumb==='one'?' 🔸한쪽':''}</div><div style="font-size:13px">${fSS(last)}</div></div>`;}

  // Sets
  h+=`<div style="margin-bottom:12px">`;
  if(ex.type==='hold'){
    h+=`<div style="display:grid;grid-template-columns:36px 1fr 50px 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--text-dim);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--text-dim)">목표(초)</span><span style="font-size:11px;font-weight:700;color:var(--text-dim);text-align:center">GO</span><span></span></div>`;
    ex.sets.forEach((s,si)=>{h+=`<div style="display:grid;grid-template-columns:36px 1fr 50px 32px;gap:8px;align-items:center;margin-bottom:6px"><span style="text-align:center;font-size:14px;font-weight:700;color:var(--accent)">${si+1}</span><input type="number" inputmode="numeric" class="si" value="${s.sec}" onchange="sE[${sI}].sets[${si}].sec=this.value" placeholder="초"><button style="background:var(--purple-dim);border:none;color:var(--purple);border-radius:8px;padding:8px;cursor:pointer;font-size:13px;font-weight:700" onclick="goHold(${si})">▶</button>${ex.sets.length>1?`<button class="btn-i danger" onclick="sE[${sI}].sets.splice(${si},1);rSess()">✕</button>`:'<span></span>'}</div>`;});
  }else if(ex.type==='weight'){
    const uL=sU==='lb'?'무게(lb)':'무게(kg)';
    h+=`<div style="display:grid;grid-template-columns:36px 1fr 1fr 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--text-dim);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--text-dim)">${uL}</span><span style="font-size:11px;font-weight:700;color:var(--text-dim)">횟수</span><span></span></div>`;
    ex.sets.forEach((s,si)=>{
      const dv=sU==='lb'&&s.lb?s.lb:s.kg;
      h+=`<div style="display:grid;grid-template-columns:36px 1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:6px"><span style="text-align:center;font-size:14px;font-weight:700;color:var(--accent)">${si+1}</span><input type="number" inputmode="decimal" class="si" value="${dv}" onchange="hWI(${si},this.value)" placeholder="0"><input type="number" inputmode="numeric" class="si" value="${s.reps}" onchange="sE[${sI}].sets[${si}].reps=this.value" placeholder="0">${ex.sets.length>1?`<button class="btn-i danger" onclick="sE[${sI}].sets.splice(${si},1);rSess()">✕</button>`:'<span></span>'}</div>`;
      if(sU==='lb'&&s.lb)h+=`<div style="grid-column:2;font-size:11px;color:var(--text-dim);margin-top:-4px;margin-bottom:4px;padding-left:4px">= ${s.kg}kg${ex.dumb==='one'?' (양쪽 '+Math.round(parseFloat(s.kg)*2*10)/10+'kg)':''}</div>`;
      else if(ex.dumb==='one'&&s.kg)h+=`<div style="grid-column:2;font-size:11px;color:var(--text-dim);margin-top:-4px;margin-bottom:4px;padding-left:4px">양쪽 = ${Math.round(parseFloat(s.kg)*2*10)/10}kg</div>`;
    });
  }else{
    h+=`<div style="display:grid;grid-template-columns:36px 1fr 32px;gap:8px;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--text-dim);text-align:center">SET</span><span style="font-size:11px;font-weight:700;color:var(--text-dim)">횟수</span><span></span></div>`;
    ex.sets.forEach((s,si)=>{h+=`<div style="display:grid;grid-template-columns:36px 1fr 32px;gap:8px;align-items:center;margin-bottom:6px"><span style="text-align:center;font-size:14px;font-weight:700;color:var(--accent)">${si+1}</span><input type="number" inputmode="numeric" class="si" value="${s.reps}" onchange="sE[${sI}].sets[${si}].reps=this.value" placeholder="0">${ex.sets.length>1?`<button class="btn-i danger" onclick="sE[${sI}].sets.splice(${si},1);rSess()">✕</button>`:'<span></span>'}</div>`;});
  }
  h+=`</div><button class="btn-s" style="margin-bottom:16px;font-size:13px;padding:10px 16px" onclick="addSS()">+ 세트 추가</button>`;

  // Rest
  h+=`<div class="card" style="display:flex;align-items:center;gap:12px;padding:14px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/></svg><div style="flex:1"><div style="font-size:13px;font-weight:600;margin-bottom:4px">쉬는 시간</div><div style="display:flex;gap:6px;align-items:center"><input type="number" inputmode="numeric" style="width:50px;text-align:center;padding:6px 8px;font-size:14px" value="${rM}" onchange="uRest(this.value,null)"><span style="font-size:13px;color:var(--text-dim)">분</span><input type="number" inputmode="numeric" style="width:50px;text-align:center;padding:6px 8px;font-size:14px" value="${rSec}" onchange="uRest(null,this.value)"><span style="font-size:13px;color:var(--text-dim)">초</span></div></div><button style="background:var(--accent-dim);border:none;color:var(--accent);border-radius:10px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit" onclick="startR()">시작</button></div>`;

  h+=`<div style="display:flex;gap:10px;margin-top:20px">`;
  if(sI>0)h+=`<button class="btn-s" style="flex:1" onclick="sI--;rSess();window.scrollTo(0,0)">이전</button>`;
  if(sI<sE.length-1)h+=`<button class="btn-p" style="flex:1" onclick="sI++;rSess();window.scrollTo(0,0)">다음 운동</button>`;
  else h+=`<button class="btn-p" style="flex:1;background:var(--orange)" onclick="finWO()">운동 완료!</button>`;
  h+=`</div>`;
  document.getElementById('sessc').innerHTML=h;
}

function hWI(si,v){const p=pW(v,sU);sE[sI].sets[si].kg=p.kg;sE[sI].sets[si].lb=p.lb;if(sU==='lb')rSess();}
function addSS(){const ex=sE[sI],last=ex.sets[ex.sets.length-1]||{};if(ex.type==='hold')ex.sets.push({sec:last.sec||''});else if(ex.type==='weight')ex.sets.push({kg:last.kg||'',reps:last.reps||'',lb:last.lb||''});else ex.sets.push({reps:last.reps||''});rSess();}
function uRest(m,s){const ex=sE[sI],cM=Math.floor(ex.restSec/60),cS=ex.restSec%60;ex.restSec=(m!==null?parseInt(m)||0:cM)*60+(s!==null?parseInt(s)||0:cS);}

// Rest
function startR(){rT=sE[sI].restSec;if(rT<=0)return;rL=rT;document.getElementById('orest').style.display='flex';uRD();rI=setInterval(()=>{rL--;uRD();if(rL<=0)stopR()},1000);}
function uRD(){const m=Math.floor(rL/60),s=rL%60;document.getElementById('rd').textContent=m+':'+s.toString().padStart(2,'0');const c=2*Math.PI*54;document.getElementById('rc').setAttribute('stroke-dashoffset',c*(1-rL/rT));}
function stopR(){clearInterval(rI);rI=null;document.getElementById('orest').style.display='none';}

// Hold countdown
function goHold(si){const t=parseInt(sE[sI].sets[si].sec)||30;hL=t;hCb=si;document.getElementById('ohold').style.display='flex';document.getElementById('hlbl').textContent=sE[sI].name+' — 세트 '+(si+1);document.getElementById('hd').textContent=hL;document.getElementById('hd').style.color='var(--orange)';hI=setInterval(()=>{hL--;document.getElementById('hd').textContent=Math.max(hL,0);if(hL<=0){clearInterval(hI);hI=null;document.getElementById('hd').style.color='var(--accent)';document.getElementById('hd').textContent='✓';}},1000);}
function stopH(ok){clearInterval(hI);hI=null;document.getElementById('ohold').style.display='none';if(ok&&hCb!==null){const t=parseInt(sE[sI].sets[hCb].sec)||0;sE[sI].sets[hCb].sec=String(t-Math.max(hL,0));rSess();}hCb=null;}

// Finish
async function finWO(){
  await autoSave();fDur=Math.round((Date.now()-sStart)/60000);
  const now=new Date();fTime=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  document.getElementById('mi').textContent=fDur+'분 동안 '+sE.length+'개 운동';
  document.getElementById('mt').textContent='완료 시각: '+fTime;
  document.getElementById('mtxt').value='';sE=[];sI=0;nav('memo');
}

async function saveMemo(){
  const memo=document.getElementById('mtxt').value.trim();
  const dt=tod();const tl=L.filter(l=>l.date===dt).sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(tl.length){tl[0].memo=memo;tl[0].completedAt=fTime;await dP('logs',tl[0]);}
  rSum();nav('sum');
}

function rSum(){
  const entries=L.filter(l=>l.date===tod());const old=L.filter(l=>l.date!==tod());
  let tV=0,tS=0,tR=0;const items=[];
  entries.forEach(e=>{
    const prev=old.filter(l=>l.exerciseId===e.exerciseId).sort((a,b)=>(b.ts||0)-(a.ts||0))[0];
    if(e.type==='hold'){const ct=e.sets.reduce((s,x)=>s+(parseInt(x.sec||x.holdSec)||0),0);tS+=e.sets.length;
      if(prev){const pt=prev.sets.reduce((s,x)=>s+(parseInt(x.sec||x.holdSec)||0),0);const d=ct-pt;items.push({t:d>0?'up':d<0?'down':'same',x:`${e.exerciseName}: ${d>0?'+':''}${d}초${d>0?' ▲':d<0?' ▼':' 유지'}`});}
      else items.push({t:'new',x:`${e.exerciseName}: 첫 기록! 🎉`});
    }else{const cv=e.sets.reduce((s,x)=>s+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0),cr=e.sets.reduce((s,x)=>s+(parseInt(x.reps)||0),0);tV+=cv;tS+=e.sets.length;tR+=cr;
      if(prev){const pv=prev.sets.reduce((s,x)=>s+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0);
        if(e.type==='weight'){const d=cv-pv;items.push({t:d>0?'up':d<0?'down':'same',x:`${e.exerciseName}: 볼륨 ${d>0?'+':''}${Math.round(d)}kg${d>0?' ▲':d<0?' ▼':' 유지'}`});
          const mW=Math.max(...e.sets.map(s=>parseFloat(s.weight)||0)),pW=Math.max(...prev.sets.map(s=>parseFloat(s.weight)||0));
          if(mW>pW)items.push({t:'pr',x:`${e.exerciseName}: 최대 ${mW}kg 🏆`});
        }else{const d=cr-prev.sets.reduce((s,x)=>s+(parseInt(x.reps)||0),0);items.push({t:d>0?'up':d<0?'down':'same',x:`${e.exerciseName}: ${d>0?'+':''}${d}회${d>0?' ▲':d<0?' ▼':''}`});}
      }else items.push({t:'new',x:`${e.exerciseName}: 첫 기록! 🎉`});
    }
  });
  const tips=[];if(tV>0)tips.push('총 볼륨: '+Math.round(tV).toLocaleString()+'kg');
  tips.push('총 '+tS+'세트'+(tR?', '+tR+'회':''));
  const lastLog=entries[entries.length-1];
  document.getElementById('sumc').innerHTML=`<div style="text-align:center;margin-bottom:24px"><div style="font-size:48px;margin-bottom:8px">🔥</div><h2 style="font-size:24px;font-weight:800">운동 완료!</h2><p style="color:var(--text-dim);font-size:14px;margin-top:4px">${fDur}분 · ${entries.length}개 운동</p>${fTime?`<p style="color:var(--accent);font-size:13px">완료: ${fTime}</p>`:''}</div><div class="card" style="background:linear-gradient(135deg,#14141f,#1a1a30)"><div style="font-size:15px;font-weight:700;margin-bottom:12px">📊 인사이트</div>${items.map(i=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:14px"><span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${i.t==='up'||i.t==='pr'?'var(--accent)':i.t==='down'?'var(--warn)':i.t==='new'?'var(--blue)':'var(--text-dim)'}"></span><span${i.t==='pr'?' style="color:var(--orange)"':''}>${esc(i.x)}</span></div>`).join('')}<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px">${tips.map(t=>`<div style="font-size:13px;color:var(--text-dim);margin-bottom:6px">${esc(t)}</div>`).join('')}</div></div>${lastLog?.memo?`<div class="card" style="margin-top:10px"><div style="font-size:13px;font-weight:700;color:var(--purple);margin-bottom:6px">📝 메모</div><div style="font-size:14px;line-height:1.6">${esc(lastLog.memo)}</div></div>`:''}<button class="btn-p" style="margin-top:16px" onclick="nav('home')">홈으로</button>`;
}

// ═══ CALENDAR ═══
function calN(d){if(CV==='month'){cM+=d;if(cM>11){cM=0;cY++}if(cM<0){cM=11;cY--}}else{const dt=new Date(cY,cM,1);dt.setDate(dt.getDate()+d*7);cY=dt.getFullYear();cM=dt.getMonth()}rCal();}
function rCal(){
  document.getElementById('cvw').className=CV==='week'?'on':'';document.getElementById('cvm').className=CV==='month'?'on':'';
  const wD=new Set(L.map(l=>l.date)),now=new Date(),ts=tod();
  const ws=new Date(now);ws.setDate(now.getDate()-now.getDay());ws.setHours(0,0,0,0);
  const ms=new Date(now.getFullYear(),now.getMonth(),1);let wc=0,mc=0;wD.forEach(d=>{const dt=new Date(d+'T00:00:00');if(dt>=ws)wc++;if(dt>=ms)mc++;});
  document.getElementById('cst').innerHTML=`<div style="background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border);text-align:center"><div style="font-size:28px;font-weight:800;color:var(--accent)">${wc}</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">이번 주</div></div><div style="background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border);text-align:center"><div style="font-size:28px;font-weight:800;color:var(--accent)">${mc}</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">이번 달</div></div>`;
  if(CV==='month'){
    document.getElementById('ctt').textContent=cY+'년 '+(cM+1)+'월';
    const f=new Date(cY,cM,1),sd=f.getDay(),dim=new Date(cY,cM+1,0).getDate(),pd=new Date(cY,cM,0).getDate();
    let h='<div class="cal-grid">';['일','월','화','수','목','금','토'].forEach(d=>h+=`<div class="cal-h">${d}</div>`);
    for(let i=sd-1;i>=0;i--)h+=`<div class="cal-d">${pd-i}</div>`;
    for(let d=1;d<=dim;d++){const ds=`${cY}-${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;h+=`<div class="cal-d cm${ds===ts?' tod':''}${wD.has(ds)?' hw':''}" onclick="shCD('${ds}')">${d}</div>`;}
    const tc=sd+dim,rm=tc%7?7-tc%7:0;for(let i=1;i<=rm;i++)h+=`<div class="cal-d">${i}</div>`;h+='</div>';
    document.getElementById('cbd').innerHTML=h;
  }else{
    const w2=new Date(cY,cM,1);w2.setDate(w2.getDate()-w2.getDay());
    const we=new Date(w2.getTime()+6*864e5);
    document.getElementById('ctt').textContent=(w2.getMonth()+1)+'/'+w2.getDate()+' ~ '+(we.getMonth()+1)+'/'+we.getDate();
    let h='<div class="cal-grid">';['일','월','화','수','목','금','토'].forEach(d=>h+=`<div class="cal-h">${d}</div>`);
    for(let i=0;i<7;i++){const d=new Date(w2.getTime()+i*864e5),ds=d.toISOString().slice(0,10);h+=`<div class="cal-d cm${ds===ts?' tod':''}${wD.has(ds)?' hw':''}" style="padding:16px 0;font-size:16px" onclick="shCD('${ds}')">${d.getDate()}</div>`;}
    h+='</div>';document.getElementById('cbd').innerHTML=h;
  }
  document.getElementById('cdt').innerHTML='';
}
function shCD(ds){const dl=L.filter(l=>l.date===ds);if(!dl.length){document.getElementById('cdt').innerHTML=`<div class="card" style="text-align:center"><span style="color:var(--text-dim);font-size:13px">${ds} — 기록 없음</span></div>`;return;}
  document.getElementById('cdt').innerHTML=`<div class="card" style="padding:14px"><div style="font-size:14px;font-weight:700;color:var(--accent);margin-bottom:10px">${ds}${dl[0].completedAt?' · '+dl[0].completedAt:''}</div>${dl.map(l=>`<div style="margin-bottom:8px"><div style="font-weight:600;font-size:14px">${esc(l.exerciseName)}${l.dumb==='one'?' 🔸한쪽':''}</div><div style="font-size:13px;color:var(--text-dim)">${fSS(l)}</div></div>`).join('')}${dl[0].memo?`<div style="font-size:12px;color:var(--purple);margin-top:6px;border-top:1px solid var(--border);padding-top:6px">📝 ${esc(dl[0].memo)}</div>`:''}</div>`;
}

// ═══ HISTORY ═══
function rHist(){
  const el=document.getElementById('hlist');if(!L.length){el.innerHTML='<p style="color:var(--text-dim);text-align:center;padding:40px">기록 없음</p>';return;}
  const bd={};L.forEach(l=>{if(!bd[l.date])bd[l.date]=[];bd[l.date].push(l)});
  const ds=Object.keys(bd).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=ds.map(d=>{const ls=bd[d];return`<div style="margin-bottom:16px"><div style="font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px">${d}${ls[0]?.completedAt?' · '+ls[0].completedAt:''}</div>${ls.map(l=>`<div class="card" style="padding:12px;margin-bottom:6px"><div class="fb"><div style="font-weight:600;font-size:14px">${esc(l.exerciseName)}${l.dumb==='one'?' <span class="badge b-o">한쪽</span>':''}</div><div style="display:flex;gap:4px"><button class="btn-i" onclick="edLog('${l.id}')">✏️</button><button class="btn-i danger" onclick="dLog('${l.id}')">🗑</button></div></div><div style="font-size:13px;color:var(--text-dim);margin-top:4px">${fFull(l)}</div><div style="font-size:11px;color:var(--text-dim);margin-top:4px">쉬는시간: ${Math.floor((l.restSec||0)/60)}분 ${(l.restSec||0)%60}초 · ${l.sets.length}세트</div></div>`).join('')}${ls[0]?.memo?`<div style="font-size:12px;color:var(--purple);margin:0 4px 8px;padding:8px 12px;background:var(--purple-dim);border-radius:10px">📝 ${esc(ls[0].memo)}</div>`:''}</div>`}).join('');
}
function fFull(l){if(l.type==='hold')return l.sets.map((s,i)=>`${i?' → ':''}${s.sec||s.holdSec||'?'}초`).join('');if(l.type==='weight')return l.sets.map((s,i)=>`${i?' → ':''}${dW(s.weight,s.lb)}×${s.reps}회`).join('');return l.sets.map((s,i)=>`${i?' → ':''}${s.reps}회`).join('');}
async function dLog(id){if(!confirm('삭제?'))return;await dD('logs',id);L=L.filter(l=>l.id!==id);rHist();}
function edLog(id){
  eLId=id;const log=L.find(l=>l.id===id);if(!log)return;
  let h=`<div class="card"><div style="font-weight:700;font-size:16px;margin-bottom:6px">${esc(log.exerciseName)}${log.dumb==='one'?' 🔸한쪽':''}</div><div style="font-size:13px;color:var(--text-dim);margin-bottom:12px">${log.date}</div>`;
  if(log.type==='hold')log.sets.forEach((s,i)=>{h+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="font-weight:700;color:var(--accent);width:30px;text-align:center">${i+1}</span><input type="number" class="si" style="flex:1" value="${s.sec||s.holdSec||''}" onchange="eLSet(${i},'sec',this.value)"><span style="color:var(--text-dim);font-size:13px">초</span></div>`;});
  else if(log.type==='weight')log.sets.forEach((s,i)=>{h+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="font-weight:700;color:var(--accent);width:30px;text-align:center">${i+1}</span><input type="number" class="si" style="flex:1" value="${s.weight}" onchange="eLSet(${i},'weight',this.value)" placeholder="kg"><input type="number" class="si" style="flex:1" value="${s.reps}" onchange="eLSet(${i},'reps',this.value)" placeholder="횟수"></div>`;});
  else log.sets.forEach((s,i)=>{h+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="font-weight:700;color:var(--accent);width:30px;text-align:center">${i+1}</span><input type="number" class="si" style="flex:1" value="${s.reps}" onchange="eLSet(${i},'reps',this.value)"></div>`;});
  h+=`<div style="margin-top:12px"><label class="label">메모</label><textarea id="elm" style="min-height:60px">${esc(log.memo||'')}</textarea></div></div><button class="btn-p" style="margin-top:12px" onclick="saveEL()">수정 완료</button>`;
  document.getElementById('elogc').innerHTML=h;nav('elog');
}
function eLSet(si,f,v){const log=L.find(l=>l.id===eLId);if(log)log.sets[si][f]=v;}
async function saveEL(){const log=L.find(l=>l.id===eLId);if(!log)return;log.memo=document.getElementById('elm').value.trim();await dP('logs',log);eLId=null;nav('hist');}

init();
</script>
</body>
</html>
